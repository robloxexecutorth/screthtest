<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --border-color: #1a1a1a;
            --secondary-text: #666666;
            --search-bg: #080808;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --border-color: #e4e4e7;
            --secondary-text: #71717a;
            --search-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        /* --- Theme Switcher --- */
        .theme-container {
            position: fixed; top: 25px; right: 210px;
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px; z-index: 100;
        }
        .theme-btn {
            padding: 8px 16px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; transition: 0.2s; color: var(--secondary-text);
        }
        .theme-btn.active {
            background: var(--text-main); color: var(--bg-color);
        }

        /* --- Discord Button --- */
        .discord-btn { 
            position: fixed; top: 25px; right: 25px;
            background: #5865F2; color: white;
            padding: 12px 24px; border-radius: 14px;
            font-size: 11px; font-weight: 900;
            text-transform: uppercase; z-index: 100;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
        }

        /* --- Search Bar --- */
        .reth-search { 
            background: var(--search-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; color: var(--text-main);
            width: 100%; padding: 24px; outline: none;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; transition: 0.3s;
        }
        .reth-search:focus { border-color: var(--secondary-text); }

        /* --- Card Layout Fix --- */
        .reth-card { 
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px; display: flex; flex-direction: column;
            overflow: hidden; transition: 0.3s; cursor: pointer;
            height: 100%;
        }
        .reth-card:hover { transform: translateY(-5px); border-color: #444; }

        .card-image-area {
            position: relative; aspect-ratio: 16/9;
            background: #000; overflow: hidden;
        }
        .card-image-area img {
            width: 100%; height: 100%; object-cover: cover;
            opacity: 0.6; transition: 0.5s;
        }
        .reth-card:hover img { opacity: 1; }

        .status-tag {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.7); padding: 4px 10px;
            border-radius: 8px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; backdrop-filter: blur(4px);
        }

        .btn-copy {
            background: var(--text-main); color: var(--bg-color);
            text-align: center; padding: 12px; border-radius: 12px;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            margin: 15px 0; transition: 0.2s;
        }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="theme-container">
        <div id="darkBtn" class="theme-btn active" onclick="setTheme('dark')">Dark</div>
        <div id="lightBtn" class="theme-btn" onclick="setTheme('light')">Light</div>
    </div>

    <a href="#" class="discord-btn">JOIN DISCORD</a>

    <div class="max-w-7xl mx-auto">
        <header class="py-16 text-center">
            <h1 class="text-7xl md:text-8xl font-black italic mb-2">RETH</h1>
            <p class="text-[10px] font-bold tracking-[0.5em] text-zinc-500 uppercase">Official Script Hub</p>
        </header>

        <div class="max-w-2xl mx-auto mb-16">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        var allScripts = [];

        // ฟังก์ชันสลับธีมแบบเขียนเต็ม (Verbose)
        function setTheme(mode) {
            var body = document.body;
            var dark = document.getElementById('darkBtn');
            var light = document.getElementById('lightBtn');

            if (mode === 'light') {
                body.setAttribute('data-theme', 'light');
                light.classList.add('active');
                dark.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                dark.classList.add('active');
                light.classList.remove('active');
            }
        }

        async function loadScripts(query) {
            var api = query 
                ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(query) 
                : "https://scriptblox.com/api/script/fetch?page=1&max=20";
            
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);

            try {
                var res = await fetch(proxy);
                var json = await res.json();
                allScripts = json.result.scripts || json.result.docs || [];
                renderUI(allScripts);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderUI(list) {
            var grid = document.getElementById('scriptGrid');
            var html = "";

            for (var i = 0; i < list.length; i++) {
                var s = list[i];
                // ตรวจสอบรูปภาพ
                var img = s.image && s.image.startsWith('/') 
                    ? "https://scriptblox.com" + s.image 
                    : (s.game.imageUrl || "https://via.placeholder.com/400x225");

                html += '<div class="reth-card p-4">';
                html += '  <div class="card-image-area rounded-xl mb-4">';
                html += '    <img src="' + img + '">';
                html += '    <div class="status-tag">' + (s.isPatched ? "Patched" : "Working") + '</div>';
                html += '  </div>';
                html += '  <div class="flex-grow">';
                html += '    <div class="text-[10px] font-bold text-zinc-500 mb-1">👁 ' + (s.views || 0).toLocaleString() + '</div>';
                html += '    <h3 class="font-black uppercase text-sm truncate">' + s.title + '</h3>';
                html += '    <p class="text-[9px] text-zinc-600 font-bold">' + (s.game.name || "Universal") + '</p>';
                html += '  </div>';
                html += '  <div class="btn-copy" onclick="copyScript(' + i + ', this)">COPY LOADSTRING</div>';
                html += '</div>';
            }
            grid.innerHTML = html;
        }

        function copyScript(index, btn) {
            var code = allScripts[index].script;
            navigator.clipboard.writeText(code);
            var oldText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.backgroundColor = "#22c55e";
            setTimeout(function() { 
                btn.innerText = oldText; 
                btn.style.backgroundColor = "";
            }, 1500);
        }

        // Search System
        var timer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timer);
            timer = setTimeout(function() { loadScripts(e.target.value); }, 500);
        });

        window.onload = function() { loadScripts(""); };
    </script>
</body>
</html>
