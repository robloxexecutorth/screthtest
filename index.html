<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- ตัวแปรสีสำหรับระบบธีม --- */
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            transition: background-color 0.3s;
        }

        /* --- จัดตำแหน่งส่วนบน (Header & Buttons) --- */
        .top-nav-area {
            position: fixed; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 15px; z-index: 100;
        }

        /* Theme Switcher */
        .theme-box {
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px;
        }
        .t-btn {
            padding: 8px 14px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; color: var(--text-dim); transition: 0.2s;
        }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        /* Discord Button */
        .discord-btn { 
            background: #5865F2; color: white;
            padding: 12px 24px; border-radius: 14px;
            font-size: 11px; font-weight: 900;
            text-transform: uppercase; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }

        /* --- Main Layout (จัดให้เหมือนต้นฉบับ) --- */
        .main-wrapper {
            max-width: 1200px; margin: 0 auto; padding: 60px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .reth-header { text-align: center; margin-bottom: 40px; }
        .reth-logo { font-size: 85px; font-weight: 900; font-style: italic; line-height: 0.9; }
        .reth-tagline { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5em; margin-top: 10px; text-transform: uppercase; }

        /* Search Bar */
        .search-box-container { width: 100%; max-width: 600px; margin-bottom: 80px; }
        .reth-input { 
            width: 100%; background: var(--search-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 26px;
            color: var(--text-main); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.2em; outline: none;
        }

        /* --- Card UI --- */
        .script-grid {
            display: grid; width: 100%;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .reth-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 24px; padding: 20px; display: flex; flex-direction: column;
            transition: 0.3s; cursor: pointer;
        }
        .reth-card:hover { transform: translateY(-5px); border-color: #333; }

        .thumb-wrap {
            position: relative; aspect-ratio: 16/9; border-radius: 18px;
            overflow: hidden; background: #000; margin-bottom: 15px;
        }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        
        .badge { position: absolute; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; }
        .b-keyless { top: 10px; left: 10px; background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .b-key { top: 10px; left: 10px; background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .b-status { top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: #fff; }

        .copy-btn {
            background: #fff; color: #000; text-align: center;
            padding: 14px; border-radius: 12px; font-size: 11px;
            font-weight: 900; text-transform: uppercase; margin-bottom: 15px;
        }

        /* --- Modal --- */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; items-center; justify-center; }
        .modal-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 30px; width: 90%; max-width: 650px; padding: 40px; position: relative; }
    </style>
</head>
<body>

    <div class="top-nav-area">
        <div class="theme-box">
            <div id="darkBtn" class="t-btn active" onclick="changeTheme('dark')">Dark</div>
            <div id="lightBtn" class="t-btn" onclick="changeTheme('light')">Light</div>
        </div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">Discord</a>
    </div>

    <div class="main-wrapper">
        <header class="reth-header">
            <h1 class="reth-logo">RETH</h1>
            <p class="reth-tagline">Official Script Hub</p>
        </header>

        <div class="search-box-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-input">
        </div>

        <div id="scriptGrid" class="script-grid">
            </div>
    </div>

    <div id="detailModal" class="modal-bg hidden">
        <div class="modal-box">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="m-title" class="text-2xl font-black uppercase italic mb-4"></h2>
            <div class="flex gap-4 mb-6">
                <button onclick="copyFromModal()" class="flex-1 bg-white text-black py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="m-web" href="#" target="_blank" class="px-8 border border-zinc-800 rounded-xl flex items-center text-[11px] font-black uppercase text-white">View Web</a>
            </div>
            <div id="m-code" class="bg-black p-5 rounded-xl font-mono text-[11px] text-zinc-600 max-h-60 overflow-y-auto break-all"></div>
        </div>
    </div>

    <script>
        var scripts = [];

        // ฟังก์ชันสลับธีม (Verbose)
        function changeTheme(mode) {
            var body = document.body;
            var d = document.getElementById('darkBtn');
            var l = document.getElementById('lightBtn');
            if (mode === 'light') {
                body.setAttribute('data-theme', 'light');
                l.classList.add('active'); d.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                d.classList.add('active'); l.classList.remove('active');
            }
        }

        async function loadData(q) {
            var api = q ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(q) : "https://scriptblox.com/api/script/fetch?page=1&max=20";
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);
            try {
                var r = await fetch(proxy);
                var j = await r.json();
                scripts = j.result.scripts || j.result.docs || [];
                render(scripts);
            } catch (e) { console.error(e); }
        }

        function render(list) {
            var g = document.getElementById('scriptGrid');
            var h = "";
            for (var i = 0; i < list.length; i++) {
                var s = list[i];
                var img = s.image && s.image.startsWith('/') ? "https://scriptblox.com" + s.image : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                
                h += '<div class="reth-card" onclick="openModal(' + i + ')">';
                h += '  <div class="thumb-wrap">';
                h += '    <img src="' + img + '">';
                h += '    <div class="badge ' + (s.key ? 'b-key' : 'b-keyless') + '">' + (s.key ? 'Key' : 'Keyless') + '</div>';
                h += '    <div class="badge b-status">' + (s.isPatched ? 'Patched' : 'Working') + '</div>';
                h += '  </div>';
                h += '  <div class="flex flex-col flex-grow">';
                h += '    <div class="flex gap-2 text-[9px] font-black text-zinc-500 mb-2">👁 ' + (s.views || 0).toLocaleString() + ' • 👍 ' + (s.likeCount || 0) + '</div>';
                h += '    <div class="copy-btn" onclick="event.stopPropagation(); fastCopy(' + i + ', this)">Copy Loadstring</div>';
                h += '    <h3 class="text-sm font-black uppercase truncate mb-1">' + s.title + '</h3>';
                h += '    <p class="text-[9px] font-bold text-zinc-600 truncate">' + (s.game.name || "Universal") + '</p>';
                h += '  </div>';
                h += '</div>';
            }
            g.innerHTML = h;
        }

        function openModal(idx) {
            var s = scripts[idx];
            document.getElementById('m-title').innerText = s.title;
            document.getElementById('m-code').innerText = s.script;
            document.getElementById('m-web').href = "https://scriptblox.com/script/" + s.slug;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

        function fastCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script);
            btn.innerText = "Done!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
            setTimeout(function() { btn.innerText = "Copy Loadstring"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 1200);
        }

        var t;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(t);
            t = setTimeout(function() { loadData(e.target.value); }, 500);
        });

        window.onload = function() { loadData(""); };
    </script>
</body>
</html>
