<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — ULTIMATE COMPLETE VER.</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.3s; margin: 0; overflow-x: hidden; }
        
        /* --- BLOCK BLUE GLOW & OUTLINE --- */
        * { -webkit-tap-highlight-color: transparent; outline: none !important; }
        *:focus { outline: none !important; box-shadow: none !important; }

        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        
        /* Navigation */
        .nav-controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); transition: 0.2s; border: none; }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        /* Search & Filter UI */
        .search-container { display: flex; gap: 12px; max-width: 650px; margin: 0 auto 60px auto; position: relative; }
        .reth-search { background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; flex: 1; padding: 22px 28px; transition: 0.3s; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 0 25px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .float-filter-menu { position: absolute; top: calc(100% + 15px); right: 0; width: 280px; background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 20px; z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(10px); transition: 0.3s; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .float-filter-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }

        /* Card Design & Effects */
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s ease; 
            overflow: hidden; position: relative; cursor: pointer;
        }
        .reth-card:hover { transform: translateY(-8px) scale(1.02); border-color: var(--text-dim); }
        .reth-card img { opacity: 0.4; transition: 0.4s ease; }
        .reth-card:hover img { opacity: 1; transform: scale(1.05); }

        /* Badges */
        .ver-badge-container { position: absolute; top: 12px; left: 12px; width: 26px; height: 26px; z-index: 30; }
        .key-info-badge { position: absolute; top: 12px; left: 46px; border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .no-ver .key-info-badge { left: 12px; } 
        .badge-keyless { background: #eab308; color: black; }
        .badge-has-key { background: #ef4444; color: white; }
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 10; display: flex; align-items: center; gap: 6px; }
        .dot { height: 6px; width: 6px; border-radius: 50%; }
        .dot.working { background: #22c55e; }

        .btn-copy-white { background: #ffffff; color: #000000; text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; width: 100%; display: block; border: none; transition: 0.2s; }
        .btn-copy-white:hover { background: #e2e2e2; }
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
        
        .btn-load-more { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 18px 40px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-load-more:hover { background: var(--text-main); color: var(--bg-color); }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <button onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</button>
        <button onclick="setTheme('light')" id="lBtn" class="t-btn">Light</button>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase flex items-center"><i class="fa-brands fa-discord mr-2"></i> Discord</a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" id="filterBtn" class="filter-btn">Filter</button>
            <div id="filterMenu" class="float-filter-menu">
                <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3">Quick Filters</h3>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Verified Only</span><input type="checkbox" id="fVer" onchange="render()"></label>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Keyless Only</span><input type="checkbox" id="fKey" onchange="render()"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>

        <div class="flex justify-center py-20" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" id="btnLoadMore" class="btn-load-more">Load More Scripts</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 opacity-0 transition-all duration-300">
        <div class="bg-[var(--modal-bg)] border border-[var(--border-color)] rounded-[35px] max-w-2xl w-full p-10 relative transform scale-95 transition-transform duration-300" id="modalContent">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase hover:text-white">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-2 flex items-center gap-2"></h2>
            <div id="mStats" class="stats-row mb-6"></div>
            <div class="flex gap-4 mb-8">
                <button id="mCopy" onclick="copyFromModal()" class="bg-white text-black flex-1 py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border border-zinc-800 rounded-xl flex items-center justify-center text-[11px] font-black uppercase text-[var(--text-main)] hover:bg-zinc-900">Source Link</a>
            </div>
            <div id="mCode" class="bg-black border border-zinc-900 p-6 rounded-2xl font-mono text-[10px] text-zinc-500 max-h-[250px] overflow-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let allScriptsMap = new Map(); // คีย์หลักป้องกันสคริปต์ซ้ำ
        let currentPage = 1;
        let searchQuery = "";
        
        // --- NEW VERIFIED STAR BADGE ---
        const verStarSVG = `<svg viewBox="0 0 24 24" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L14.39 3.46L17.77 2.82L18.89 6.04L22.14 7.02L21.31 10.33L23 13.17L20.61 15.63L21.25 19.01L18.03 20.13L17.05 23.38L13.74 22.55L10.9 24.24L8.44 21.85L5.06 22.49L3.94 19.27L0.69 18.29L1.52 14.98L-0.17 12.14L2.22 9.68L1.58 6.3L4.8 5.18L5.78 1.93L9.09 2.76L11.93 1.07Z" fill="#1D9BF0"/>
            <path d="M9.5 15.5l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4-7 7z" fill="white"/>
        </svg>`;

        async function fetchScripts(query = "", page = 1, append = false) {
            searchQuery = query;
            currentPage = page;
            const api = query 
                ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}&max=20&page=${page}`
                : `https://scriptblox.com/api/script/fetch?page=${page}&max=20`;
            
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                const newScripts = data.result.scripts || data.result.docs || [];
                
                if (!append) allScriptsMap.clear(); 
                
                newScripts.forEach(s => {
                    const id = s._id || s.id || s.slug;
                    allScriptsMap.set(id, s); // ถ้า ID ซ้ำ จะเขียนทับตัวเดิม ไม่เกิดตัวใหม่
                });

                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 1)) ? 'flex' : 'none';
                render();
            } catch (e) { console.error("API Error"); }
        }

        function render() {
            const isVerOnly = document.getElementById('fVer').checked;
            const isKeylessOnly = document.getElementById('fKey').checked;
            const list = Array.from(allScriptsMap.values());

            const filtered = list.filter(s => {
                if (isVerOnly && !s.verified) return false;
                if (isKeylessOnly && s.key !== false) return false;
                return true;
            });

            let html = "";
            filtered.forEach((s) => {
                const id = s._id || s.id || s.slug;
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                html += `
                <div class="reth-card p-6 ${!s.verified ? 'no-ver' : ''}" onclick="openModal('${id}')">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900">
                        ${s.verified ? `<div class="ver-badge-container">${verStarSVG}</div>` : ""}
                        <div class="key-info-badge ${s.key ? 'badge-has-key' : 'badge-keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <div class="status-badge"><span class="dot working"></span> Working</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="btn-copy-white" onclick="event.stopPropagation(); quickCopy('${id}', this)">Copy Loadstring</div>
                    <div class="stats-row">
                        <span><i class="fa-solid fa-eye"></i> ${s.views.toLocaleString()}</span>
                        <span class="text-green-500">👍 ${s.likeCount || 0}</span>
                        <span class="text-red-500">👎 ${s.dislikeCount || 0}</span>
                    </div>
                    <h3 class="text-sm font-black uppercase truncate">${s.title}</h3>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html || '<p class="col-span-full text-center py-20 opacity-20 uppercase font-black">No Results Found</p>';
        }

        function loadMore() {
            const btn = document.getElementById('btnLoadMore');
            btn.innerText = "LOADING...";
            fetchScripts(searchQuery, currentPage + 1, true).then(() => btn.innerText = "Load More Scripts");
        }

        function openModal(id) {
            const s = allScriptsMap.get(id);
            document.getElementById('mTitle').innerHTML = `${s.title}${s.verified ? `<div class="w-6 h-6 inline-block align-middle ml-2">${verStarSVG}</div>` : ""}`;
            document.getElementById('mStats').innerHTML = `VIEWS: ${s.views.toLocaleString()} | 👍 ${s.likeCount || 0} | 👎 ${s.dislikeCount || 0}`;
            document.getElementById('mCode').innerText = s.script || "-- No Script Data --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => { 
                m.classList.add('opacity-100'); 
                document.getElementById('modalContent').classList.replace('scale-95', 'scale-100'); 
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal');
            document.getElementById('modalContent').classList.replace('scale-100', 'scale-95');
            m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function quickCopy(id, btn) {
            const s = allScriptsMap.get(id);
            navigator.clipboard.writeText(s.script).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!";
                btn.style.background = "#22c55e"; btn.style.color = "#fff";
                setTimeout(() => { 
                    btn.innerText = old; 
                    btn.style.background = ""; 
                    btn.style.color = ""; 
                }, 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                const btn = document.getElementById('mCopy');
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Script", 1500);
            });
        }

        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('show'); }
        
        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = m === 'dark' ? 't-btn active' : 't-btn';
            document.getElementById('lBtn').className = m === 'light' ? 't-btn active' : 't-btn';
        }

        let debounce;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounce);
            debounce = setTimeout(() => fetchScripts(e.target.value, 1, false), 500);
        });

        window.onload = () => fetchScripts("", 1, false);
    </script>
</body>
</html>
