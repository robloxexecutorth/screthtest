<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            transition: background-color 0.3s;
        }

        /* --- Header --- */
        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        .nav-controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        /* --- Search --- */
        .search-container { display: flex; gap: 12px; max-width: 650px; margin: 0 auto 60px auto; position: relative; }
        .reth-search { background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; flex: 1; padding: 22px 28px; outline: none; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 0 25px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }

        /* --- Card --- */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; position: relative; cursor: pointer; }
        
        .reth-card img { 
            opacity: 0.4; 
            transition: opacity 0.4s ease, transform 0.4s ease; 
        }

        .reth-card:hover img { 
            opacity: 1; 
            transform: scale(1.05);
        }

        .reth-card:hover { 
            transform: translateY(-8px); 
            border-color: #333; 
        }
        
        /* Badges Positioning */
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 10; display: flex; align-items: center; gap: 6px; }
        .ver-badge-cover { position: absolute; top: 12px; left: 12px; background: #3b82f6; color: white; border-radius: 8px; padding: 5px; z-index: 20; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        
        .key-info-badge { position: absolute; top: 12px; left: 42px; border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .no-ver .key-info-badge { left: 12px; } 
        
        .badge-keyless { background: #eab308; color: black; }
        .badge-has-key { background: #ef4444; color: white; }

        .dot { height: 6px; width: 6px; border-radius: 50%; }
        .dot.working { background: #22c55e; }
        .dot.patched { background: #ef4444; }

        .btn-copy-white { background: #ffffff; color: #000000; text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; width: 100%; display: block; }
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }

        /* --- Modal & Load More --- */
        .load-more-container { display: flex; justify-content: center; padding: 60px 0; }
        .btn-load-more { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 18px 40px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .float-filter-menu { position: absolute; top: calc(100% + 15px); right: 0; width: 280px; background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 20px; z-index: 1000; opacity: 0; visibility: hidden; transform: translateY(10px); transition: 0.3s; }
        .float-filter-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <div onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</div>
        <div onclick="setTheme('light')" id="lBtn" class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase"><i class="fa-brands fa-discord mr-1"></i> Discord</a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" id="filterBtn" class="filter-btn">Filter</button>
            <div id="filterMenu" class="float-filter-menu">
                <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3">Quick Filters</h3>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Verified Only</span><input type="checkbox" onchange="updateFilter('verified', this.checked)"></label>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Keyless Only</span><input type="checkbox" onchange="updateFilter('keyless', this.checked)"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>

        <div class="load-more-container" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" id="btnLoadMore" class="btn-load-more">Load More Scripts</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 opacity-0">
        <div class="bg-[var(--modal-bg)] border border-[var(--border-color)] rounded-[35px] max-w-2xl w-full p-10 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-2"></h2>
            <div id="mStats" class="stats-row mb-6"></div>
            <div class="flex gap-4 mb-8">
                <button id="mCopy" onclick="copyFromModal()" class="bg-white text-black flex-1 py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border border-zinc-800 rounded-xl flex items-center justify-center text-[11px] font-black uppercase">Source</a>
            </div>
            <div id="mCode" class="bg-black border border-zinc-900 p-6 rounded-2xl font-mono text-xs text-zinc-500 max-h-[250px] overflow-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let scripts = [];
        let filters = { verified: false, keyless: false };
        let currentPage = 1;
        let currentQuery = "";
        const maxPerPage = 20;

        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('show'); }
        function updateFilter(k, v) { filters[k] = v; apply(); }
        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = m === 'dark' ? 't-btn active' : 't-btn';
            document.getElementById('lBtn').className = m === 'light' ? 't-btn active' : 't-btn';
        }

        async function load(q = "", page = 1, append = false) {
            currentQuery = q;
            currentPage = page;
            const api = q 
                ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=${maxPerPage}&page=${page}` 
                : `https://scriptblox.com/api/script/fetch?page=${page}&max=${maxPerPage}`;
            
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                const newScripts = data.result.scripts || data.result.docs || [];
                
                scripts = append ? [...scripts, ...newScripts] : newScripts;
                const totalPages = data.result.totalPages || 0;
                document.getElementById('loadMoreArea').style.display = (currentPage < totalPages) ? 'flex' : 'none';

                apply();
            } catch (e) { console.error("Error loading scripts"); }
        }

        function loadMore() {
            const btn = document.getElementById('btnLoadMore');
            btn.innerText = "LOADING...";
            load(currentQuery, currentPage + 1, true).then(() => {
                btn.innerText = "Load More Scripts";
            });
        }

        function apply() {
            const f = scripts.filter(s => {
                if (filters.verified && !s.verified) return false;
                if (filters.keyless && s.key !== false) return false;
                return true;
            });
            render(f);
        }

        function render(list) {
            let html = "";
            list.forEach((s) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                const vBadge = s.verified ? `<div class="ver-badge-cover"><i class="fa-solid fa-check text-[10px]"></i></div>` : "";
                const keyBadge = s.key ? 
                    `<div class="key-info-badge badge-has-key">Key</div>` : 
                    `<div class="key-info-badge badge-keyless">Keyless</div>`;
                const idx = scripts.indexOf(s);
                
                html += `
                <div class="reth-card p-6 ${!s.verified ? 'no-ver' : ''}" onclick="openModal(${idx})">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900">
                        ${vBadge}
                        ${keyBadge}
                        <div class="status-badge"><span class="dot ${s.isPatched ? 'patched' : 'working'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="btn-copy-white" onclick="event.stopPropagation(); quickCopy(${idx}, this)">Copy Loadstring</div>
                    <div class="stats-row">
                        <span><i class="fa-solid fa-eye mr-1"></i> ${s.views.toLocaleString()}</span>
                        <span class="text-green-500"><i class="fa-solid fa-thumbs-up mr-1"></i> ${s.likeCount}</span>
                        <span class="text-red-500"><i class="fa-solid fa-thumbs-down mr-1"></i> ${s.dislikeCount}</span>
                    </div>
                    <h3 class="text-sm font-black uppercase truncate">${s.title}</h3>
                    <p class="text-[9px] font-bold text-zinc-500 uppercase mt-1 truncate">${s.game.name}</p>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html || '<p class="col-span-full text-center py-20 font-black opacity-20">NO RESULTS FOUND</p>';
        }

        function openModal(idx) {
            const s = scripts[idx];
            document.getElementById('mTitle').innerHTML = s.title;
            // Dislike กลับมาแล้วในบรรทัดนี้
            document.getElementById('mStats').innerHTML = `
                <span><i class="fa-solid fa-eye"></i> VIEWS: ${s.views.toLocaleString()}</span> | 
                <span class="text-green-500">👍 LIKES: ${s.likeCount}</span> | 
                <span class="text-red-500">👎 DISLIKES: ${s.dislikeCount}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- No Data --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function quickCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!"; btn.style.background = "#22c55e"; btn.style.color = "#fff";
                setTimeout(() => { btn.innerText = old; btn.style.background = ""; btn.style.color = ""; }, 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                const btn = document.getElementById('mCopy'); btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Script", 1500);
            });
        }

        let debounce;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounce);
            debounce = setTimeout(() => load(e.target.value, 1, false), 500);
        });

        window.onload = () => load("", 1, false);
    </script>
</body>
</html>
