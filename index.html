<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            transition: background-color 0.3s;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        .nav-controls {
            position: fixed; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 12px; z-index: 100;
        }
        .theme-toggle {
            display: flex; background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px;
        }
        .t-btn {
            padding: 8px 12px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; color: var(--text-dim); transition: 0.2s;
        }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        .discord-btn { 
            background: #5865F2; color: white; padding: 12px 24px; border-radius: 14px;
            font-size: 11px; font-weight: 900; text-transform: uppercase; text-decoration: none; 
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        /* --- Header & Search --- */
        .reth-title { font-size: 85px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        .reth-title-underline { height: 2px; width: 120px; background-color: var(--border-color); margin-top: -10px; }
        .reth-subtitle { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5em; margin-top: 15px; }
        
        .reth-search { 
            background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; 
            color: var(--text-main); font-size: 13px; font-weight: 700; text-transform: uppercase; 
            width: 100%; padding: 26px; outline: none; transition: 0.3s;
        }
        .reth-search:focus { border-color: var(--text-dim); }

        /* --- Filter Layout --- */
        .filter-container { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
        .filter-pill {
            padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-dim); font-size: 9px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.2s;
        }
        .filter-pill:hover { border-color: var(--text-main); color: var(--text-main); }
        .filter-pill.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        /* --- Card Styles --- */
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 24px; transition: 0.3s; height: 100%; 
            display: flex; flex-direction: column; overflow: hidden; position: relative; cursor: pointer; 
        }
        .reth-card:hover { border-color: var(--text-dim); transform: translateY(-5px); }
        .reth-card img { opacity: 0.4; transition: 0.5s; }
        .reth-card:hover img { opacity: 0.8; }

        .status-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 5px 12px; font-size: 9px; font-weight: 900;
            display: flex; align-items: center; gap: 6px; color: #fff; z-index: 10; backdrop-filter: blur(4px);
        }
        .status-dot { height: 6px; width: 6px; border-radius: 50%; }
        .status-dot.working { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .status-dot.patched { background: #ef4444; box-shadow: 0 0 8px #ef4444; }

        .key-tag { 
            position: absolute; top: 12px; left: 12px; font-size: 8px; font-weight: 900; 
            text-transform: uppercase; padding: 5px 10px; border-radius: 8px; z-index: 10; 
        }
        .key-required { background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .keyless { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }

        .verified-badge { color: #3b82f6; margin-left: 6px; display: inline-flex; align-items: center; }

        /* --- Stats & Buttons --- */
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; }
        .btn-copy-main { 
            background: var(--text-main); color: var(--bg-color); text-align: center; 
            padding: 14px 0; border-radius: 14px; font-size: 11px; font-weight: 900; 
            text-transform: uppercase; cursor: pointer; margin-bottom: 15px; transition: 0.2s;
        }
        .btn-copy-main:active { transform: scale(0.98); }

        /* --- Modal --- */
        .modal-content { background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 30px; max-width: 650px; width: 95%; padding: 40px; color: var(--text-main); }
        .script-box { background: #000; border: 1px solid #111; border-radius: 16px; padding: 20px; font-family: monospace; font-size: 12px; color: #666; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <div class="theme-toggle">
            <div id="darkBtn" class="t-btn active" onclick="setTheme('dark')">Dark</div>
            <div id="lightBtn" class="t-btn" onclick="setTheme('light')">Light</div>
        </div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">Join Discord</a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-16 md:py-24 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <div class="reth-title-underline"></div>
            <p class="reth-subtitle">OFFICIAL SCRIPT HUB</p>
        </header>

        <div class="max-w-[600px] mx-auto mb-10">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
        </div>

        <div class="filter-container">
            <div id="filter-universal" class="filter-pill" onclick="toggleFilter('universal')">Universal</div>
            <div id="filter-verified" class="filter-pill" onclick="toggleFilter('verified')">Verified</div>
            <div id="filter-keyless" class="filter-pill" onclick="toggleFilter('keyless')">Keyless</div>
            <div id="filter-working" class="filter-pill" onclick="toggleFilter('working')">Working</div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <div id="scriptModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="modal-content relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-zinc-600 hover:text-white font-bold uppercase text-[10px]">Close [X]</button>
            <h2 id="modalTitle" class="text-2xl font-black uppercase italic mb-2 flex items-center"></h2>
            <div id="modalStats" class="stats-row mb-3"></div>
            <p id="modalGame" class="text-[11px] text-zinc-500 font-bold uppercase tracking-widest mb-10"></p>
            <div onclick="copyFromModal()" id="modalCopyBtn" class="btn-copy-main">COPY SCRIPT</div>
            <div id="modalScript" class="script-box"></div>
        </div>
    </div>

    <script>
        var scriptGrid = document.getElementById('scriptGrid');
        var modal = document.getElementById('scriptModal');
        var scriptsData = [];
        var activeFilters = { universal: false, verified: false, keyless: false, working: false };

        function setTheme(mode) {
            document.body.setAttribute('data-theme', mode === 'light' ? 'light' : '');
            document.getElementById('lightBtn').classList.toggle('active', mode === 'light');
            document.getElementById('darkBtn').classList.toggle('active', mode === 'dark');
            localStorage.setItem('rethTheme', mode);
        }

        function toggleFilter(type) {
            activeFilters[type] = !activeFilters[type];
            document.getElementById('filter-' + type).classList.toggle('active');
            renderUI(scriptsData);
        }

        async function fetchData(query = "") {
            const api = query ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(query)}&max=50` : `https://scriptblox.com/api/script/fetch?page=1&max=50`;
            const proxy = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(api)}`;
            try {
                const res = await fetch(proxy);
                const data = await res.json();
                scriptsData = data.result.scripts || data.result.docs || [];
                renderUI(scriptsData);
            } catch (e) { console.error("Fetch error", e); }
        }

        function renderUI(data) {
            const filtered = data.filter(s => {
                if (activeFilters.universal && !s.isUniversal) return false;
                if (activeFilters.verified && !s.verified) return false;
                if (activeFilters.keyless && s.key) return false;
                if (activeFilters.working && s.isPatched) return false;
                return true;
            });

            scriptGrid.innerHTML = filtered.map((s, idx) => `
                <div class="reth-card p-6" onclick="openModal(${scriptsData.indexOf(s)})">
                    <div class="relative aspect-video bg-black rounded-2xl mb-5 overflow-hidden">
                        <div class="key-tag ${s.key ? 'key-required' : 'keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <div class="status-badge"><span class="status-dot ${s.isPatched ? 'patched' : 'working'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <img src="${s.image?.includes('http') ? s.image : 'https://scriptblox.com' + s.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="stats-row"><span>👁 ${s.views || 0}</span><span style="color:#22c55e">👍 ${s.likeCount || 0}</span></div>
                    <div class="btn-copy-main" onclick="event.stopPropagation(); copy(scriptsData[${scriptsData.indexOf(s)}].script, this)">COPY LOADSTRING</div>
                    <h3 class="text-sm font-black uppercase flex items-center truncate">${s.title} ${s.verified ? '<span class="verified-badge"><svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.067.87a2.89 2.89 0 0 0-4.134 0l-.622.638-.89-.011a2.89 2.89 0 0 0-2.924 2.924l.01.89-.636.622a2.89 2.89 0 0 0 0 4.134l.637.622-.011.89a2.89 2.89 0 0 0 2.924 2.924l.89-.01.622.636a2.89 2.89 0 0 0 4.134 0l.622-.637.89.011a2.89 2.89 0 0 0 2.924-2.924l-.01-.89.636-.622a2.89 2.89 0 0 0 0-4.134l-.637-.622.011-.89a2.89 2.89 0 0 0-2.924-2.924l-.89.01-.622-.636zm.287 5.984-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708.708z"/></svg></span>' : ''}</h3>
                    <p class="text-[9px] text-zinc-600 font-bold uppercase truncate">${s.game ? s.game.name : "Universal Script"}</p>
                </div>
            `).join('') || '<p class="text-center col-span-full py-20 opacity-20 uppercase font-black">No results found.</p>';
        }

        function openModal(idx) {
            const s = scriptsData[idx];
            document.getElementById('modalTitle').innerHTML = s.title + (s.verified ? ' <span class="verified-badge">...</span>' : '');
            document.getElementById('modalGame').innerText = s.game ? s.game.name : 'Universal';
            document.getElementById('modalScript').innerText = s.script;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        }

        function closeModal() {
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function copy(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = old, 1500);
            });
        }

        function copyFromModal() { copy(document.getElementById('modalScript').innerText, document.getElementById('modalCopyBtn')); }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(window.t); window.t = setTimeout(() => fetchData(e.target.value), 500);
        });

        window.onload = () => { if(localStorage.getItem('rethTheme') === 'light') setTheme('light'); fetchData(); };
    </script>
</body>
</html>
