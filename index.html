<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — COMPACT VERSION</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-color: #1f1f1f;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-dim: #71717a;
            --border-color: #e4e4e7;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: 0.3s;
        }

        /* --- Header & Nav (Compact) --- */
        .nav-controls { position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 10px 16px; 
            border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: var(--text-dim);
        }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }
        .discord-btn {
            background: var(--accent); color: white; padding: 10px 20px; border-radius: 12px;
            font-size: 10px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; gap: 8px;
        }

        /* --- Search Row (บีบให้ไม่ยืด) --- */
        .search-wrap { max-width: 600px; margin: 0 auto 50px; display: flex; gap: 10px; }
        .reth-search { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; 
            color: var(--text-main); font-size: 13px; font-weight: 600; flex: 1; padding: 18px 24px; outline: none;
        }
        .filter-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 0 20px; 
            border-radius: 16px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }

        /* --- Grid & Cards (ปรับให้สมส่วนไม่ยืด) --- */
        .content-container { max-width: 1100px; margin: 0 auto; }
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; 
            transition: 0.3s; overflow: hidden; position: relative; cursor: pointer; display: flex; flex-direction: column;
        }
        .reth-card:hover { transform: translateY(-4px); border-color: var(--text-dim); }
        
        .thumb-wrap { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .reth-card img { opacity: 0.6; width: 100%; h: 100%; object-fit: cover; }
        
        /* Badges */
        .badge { position: absolute; padding: 4px 8px; border-radius: 6px; font-size: 8px; font-weight: 900; text-transform: uppercase; z-index: 10; }
        .badge-ver { top: 10px; left: 10px; background: #3b82f6; color: white; }
        .badge-key { top: 10px; right: 10px; display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.7); }
        .badge-type { bottom: 10px; left: 10px; }
        .badge-keyless { background: #eab308; color: black; }
        .badge-has-key { background: #ef4444; color: white; }

        .dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot.working { background: #22c55e; }
        .dot.patched { background: #ef4444; }

        .card-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .stats-row { display: flex; gap: 10px; font-size: 9px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; }
        .btn-copy-main { 
            background: var(--text-main); color: var(--bg-color); text-align: center; padding: 12px; 
            border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 12px;
        }

        /* --- Modal --- */
        #modal { transition: 0.3s; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; max-width: 600px; width: 90%; padding: 30px; position: relative; }

        /* --- Footer --- */
        .footer { text-align: center; padding: 50px 0; border-top: 1px solid var(--border-color); margin-top: 50px; opacity: 0.5; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body class="p-6">

    <nav class="nav-controls">
        <div onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</div>
        <div onclick="setTheme('light')" id="lBtn" class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">
            <i class="fa-brands fa-discord"></i> Discord
        </a>
    </nav>

    <div class="content-container">
        <header class="py-16 text-center">
            <h1 class="text-6xl md:text-7xl font-black italic tracking-tighter mb-2">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.4em]">Official Script Hub</p>
        </header>

        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" class="filter-btn">Filter</button>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div class="flex justify-center py-12" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" id="btnLoadMore" class="t-btn !px-10 !py-4 hover:border-white transition">Load More</button>
        </div>

        <footer class="footer">
            Powered by <span class="text-[#5865F2]">ScriptBlox</span> & Reth Official
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 z-[2000] hidden items-center justify-center p-4 opacity-0">
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-[9px] font-black opacity-40 hover:opacity-100">CLOSE [X]</button>
            <h2 id="mTitle" class="text-xl font-black uppercase italic mb-1"></h2>
            <p id="mGame" class="text-[10px] font-bold text-zinc-500 uppercase mb-4"></p>
            <div id="mStats" class="stats-row border-b border-zinc-800 pb-4 mb-4"></div>
            <div class="flex gap-3 mb-6">
                <button id="mCopy" onclick="copyFromModal()" class="btn-copy-main flex-1 mb-0">Copy Loadstring</button>
                <a id="mLink" href="#" target="_blank" class="border border-zinc-800 rounded-xl px-6 flex items-center text-[10px] font-black uppercase">Source</a>
            </div>
            <div id="mCode" class="bg-black/50 border border-zinc-800 p-4 rounded-xl font-mono text-[10px] text-zinc-500 max-h-[200px] overflow-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let scripts = [];
        let filters = { verified: false, keyless: false };
        let currentPage = 1;
        let currentQuery = "";

        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = (m==='dark'?'t-btn active':'t-btn');
            document.getElementById('lBtn').className = (m==='light'?'t-btn active':'t-btn');
        }

        async function load(q = "", page = 1, append = false) {
            currentQuery = q; currentPage = page;
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=12&page=${page}` : `https://scriptblox.com/api/script/fetch?page=${page}&max=12`;
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                const newItems = data.result.scripts || data.result.docs || [];
                scripts = append ? [...scripts, ...newItems] : newItems;
                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 0)) ? 'flex' : 'none';
                render();
            } catch (e) { console.log("Fetch Error"); }
        }

        function render() {
            let html = "";
            scripts.forEach((s, idx) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                html += `
                <div class="reth-card" onclick="openModal(${idx})">
                    <div class="thumb-wrap">
                        ${s.verified ? '<div class="badge badge-ver"><i class="fa-solid fa-check-double"></i></div>' : ''}
                        <div class="badge badge-key">
                            <span class="dot ${s.isPatched ? 'patched' : 'working'}"></span>
                            ${s.isPatched ? 'Patched' : 'Working'}
                        </div>
                        <div class="badge badge-type ${s.key ? 'badge-has-key' : 'badge-keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <img src="${thumb}">
                    </div>
                    <div class="card-info">
                        <div class="stats-row">
                            <span><i class="fa-solid fa-eye"></i> ${(s.views||0).toLocaleString()}</span>
                            <span class="text-green-500"><i class="fa-solid fa-thumbs-up"></i> ${s.likeCount||0}</span>
                            <span class="text-red-500"><i class="fa-solid fa-thumbs-down"></i> ${s.dislikeCount||0}</span>
                        </div>
                        <div class="btn-copy-main" onclick="event.stopPropagation(); quickCopy(${idx}, this)">Copy Loadstring</div>
                        <h3 class="text-xs font-black uppercase truncate">${s.title}</h3>
                        <p class="text-[9px] font-bold text-zinc-500 uppercase mt-1 truncate">${s.game.name}</p>
                    </div>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html;
        }

        function openModal(idx) {
            const s = scripts[idx];
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mGame').innerText = s.game.name;
            document.getElementById('mStats').innerHTML = `
                <span>VIEWS: ${(s.views||0).toLocaleString()}</span> | 
                <span class="text-green-500">LIKES: ${s.likeCount||0}</span> | 
                <span class="text-red-500">DISLIKES: ${s.dislikeCount||0}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- No Script --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function quickCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!"; btn.style.background = "#22c55e";
                setTimeout(() => { btn.innerText = old; btn.style.background = ""; }, 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                const btn = document.getElementById('mCopy'); btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Loadstring", 1500);
            });
        }

        function loadMore() { load(currentQuery, currentPage + 1, true); }

        let dt;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(dt); dt = setTimeout(() => load(e.target.value, 1, false), 500);
        });

        window.onload = () => load();
    </script>
</body>
</html>
