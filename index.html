<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — THE ULTIMATE 3D SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(10, 10, 10, 0.7);
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-color: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(12, 12, 12, 0.98);
            --accent: #1D9BF0;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --card-bg: rgba(240, 240, 240, 0.8);
            --text-main: #000000;
            --text-dim: #666666;
            --border-color: rgba(0, 0, 0, 0.15);
            --modal-bg: #ffffff;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.4s, color 0.4s; 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
        }
        
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reth-title { font-size: clamp(55px, 9vw, 110px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 0.85; letter-spacing: -0.05em; }
        
        .nav-sticky { position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(25px); background: rgba(0,0,0,0.05); padding: 20px 0; border-bottom: 1px solid var(--border-color); }

        .reth-search { 
            background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 22px; 
            color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; 
            width: 100%; padding: 20px 28px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .reth-search:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 25px rgba(29, 155, 240, 0.2); }

        .reth-card { 
            background: var(--card-bg); border: 1.5px solid var(--border-color); border-radius: 32px; 
            transition: 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; position: relative; 
            backdrop-filter: blur(15px); animation: slideUp 0.7s ease-out forwards;
        }
        .reth-card:hover { transform: translateY(-12px); border-color: var(--text-main); box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .skeleton { background: linear-gradient(90deg, var(--card-bg) 25%, var(--border-color) 50%, var(--card-bg) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        .ver-badge { position: absolute; top: 15px; left: 15px; width: 28px; height: 28px; z-index: 30; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .key-badge { position: absolute; top: 15px; left: 50px; border-radius: 9px; padding: 5px 12px; font-size: 9px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .status-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.75); border-radius: 9px; padding: 5px 12px; font-size: 9px; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 6px; }
        .dot { height: 7px; width: 7px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        .btn-copy-main { background: #ffffff; color: #000; padding: 15px; border-radius: 16px; font-size: 11px; font-weight: 900; text-transform: uppercase; width: 100%; display: block; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 15px; border: none; }
        .btn-copy-main:hover { background: #e0e0e0; transform: scale(1.02); }
        .btn-copy-main:active { transform: scale(0.97); }

        #modal { backdrop-filter: blur(35px); transition: 0.4s; }
        pre { 
            background: #000000; padding: 25px; border-radius: 20px; font-size: 12px; 
            color: #22c55e; overflow: auto; border: 1px solid #222; 
            white-space: pre-wrap; word-break: break-all; max-height: 250px;
            font-family: 'Courier New', monospace;
        }

        #toast { 
            position: fixed; bottom: 45px; left: 50%; transform: translateX(-50%); 
            background: #22c55e; color: white; padding: 14px 40px; border-radius: 50px; 
            font-size: 12px; font-weight: 900; z-index: 10000; display: none; 
            box-shadow: 0 15px 35px rgba(34, 197, 94, 0.3); animation: popIn 0.3s ease;
        }
        @keyframes popIn { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast">SUCCESSFULLY COPIED!</div>

    <nav class="nav-sticky px-6 md:px-16">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-2xl italic tracking-tighter">RETH<span class="text-[var(--accent)]">.</span></div>
            <div class="flex items-center gap-8">
                <div class="hidden sm:flex gap-5">
                    <button onclick="setTheme('dark')" id="dBtn" class="text-[10px] font-black uppercase tracking-widest transition hover:text-[var(--accent)]">Dark</button>
                    <button onclick="setTheme('light')" id="lBtn" class="text-[10px] font-black uppercase tracking-widest opacity-40 transition hover:text-[var(--accent)]">Light</button>
                </div>
                <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] px-6 py-3 rounded-2xl text-[10px] font-black uppercase flex items-center gap-2 hover:opacity-80 transition"><i class="fa-brands fa-discord"></i> Discord Hub</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pb-20">
        <header class="py-28 text-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[12px] font-black text-zinc-500 uppercase tracking-[0.7em] mt-8">Ultimate Script Solution</p>
        </header>

        <div class="max-w-3xl mx-auto mb-24 relative">
            <div class="flex gap-4">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-zinc-500 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search pl-16">
                </div>
                <button onclick="toggleFilter()" class="bg-[var(--card-bg)] px-10 rounded-2xl border-2 border-[var(--border-color)] text-[10px] font-black uppercase hover:border-white transition">Filter</button>
            </div>
            
            <div id="filterMenu" class="absolute top-full mt-5 right-0 w-72 bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-3xl p-8 hidden shadow-2xl z-50">
                <h4 class="text-[10px] font-black text-zinc-500 uppercase mb-5 tracking-widest">Preferences</h4>
                <label class="flex justify-between items-center mb-5 cursor-pointer text-[11px] font-black uppercase group">
                    <span>Verified Only</span>
                    <input type="checkbox" id="fVer" onchange="render()" class="w-4 h-4 accent-[var(--accent)]">
                </label>
                <label class="flex justify-between items-center cursor-pointer text-[11px] font-black uppercase group">
                    <span>Keyless Only</span>
                    <input type="checkbox" id="fKey" onchange="render()" class="w-4 h-4 accent-[var(--accent)]">
                </label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10"></div>

        <div id="loadArea" class="flex justify-center mt-28 hidden">
            <button onclick="loadMore()" class="bg-[var(--text-main)] text-[var(--bg-color)] px-16 py-6 rounded-full text-[12px] font-black uppercase hover:scale-105 transition-all duration-300 shadow-2xl">Load More Scripts</button>
        </div>

        <footer class="mt-40 py-24 border-t border-[var(--border-color)] text-center">
            <div class="flex flex-col items-center gap-6">
                <p class="text-[11px] font-black uppercase text-zinc-600 tracking-[0.5em]">Data Provided & Powered by</p>
                <a href="https://scriptblox.com" target="_blank" class="hover:scale-110 transition-transform duration-500">
                    <span class="text-3xl font-black italic tracking-tighter text-[var(--text-main)]">SCRIPT<span class="text-[var(--accent)]">BLOX</span></span>
                </a>
                <p class="text-[10px] font-medium text-zinc-700 uppercase mt-8 tracking-widest">© 2026 RETH OFFICIAL — Crafted for Excellence</p>
            </div>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-5 bg-black/95 opacity-0 transition-opacity duration-300">
        <div class="bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-[45px] max-w-4xl w-full p-10 md:p-14 relative max-h-[92vh] overflow-y-auto custom-scroll">
            <button onclick="closeModal()" class="absolute top-10 right-10 text-zinc-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-3xl"></i></button>
            <h2 id="mTitle" class="text-4xl font-black italic uppercase mb-6 pr-12 leading-[1.1]"></h2>
            <div id="mStats" class="flex flex-wrap gap-8 text-[11px] font-black text-zinc-500 uppercase mb-10 border-b border-zinc-800 pb-8"></div>
            <div class="grid lg:grid-cols-2 gap-12 mb-12">
                <div class="rounded-[30px] overflow-hidden border-2 border-zinc-800 bg-black aspect-video shadow-2xl">
                    <img id="mImg" src="" class="w-full h-full object-cover">
                </div>
                <div class="flex flex-col justify-center gap-5">
                    <button onclick="copyFromModal()" class="bg-white text-black py-5 rounded-2xl font-black text-[13px] uppercase hover:bg-zinc-200 transition shadow-lg">Copy Script To Clipboard</button>
                    <a id="mLink" href="#" target="_blank" class="border-2 border-zinc-800 py-5 rounded-2xl font-black text-[13px] uppercase text-center hover:bg-white/5 transition">Open Original Source</a>
                </div>
            </div>
            <div class="space-y-4">
                <p class="text-[11px] font-black uppercase text-zinc-500 tracking-widest ml-2">Code Preview:</p>
                <pre id="mCode"></pre>
            </div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
        const shapes = [];

        function init3D() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = 35;
            const geometries = [new THREE.IcosahedronGeometry(2.2,0), new THREE.BoxGeometry(3.2,3.2,3.2), new THREE.OctahedronGeometry(2.8)];
            for(let i=0; i<55; i++) {
                const mat = new THREE.MeshPhongMaterial({ color: 0x4f6b8f, wireframe: true, transparent: true, opacity: 0.12 });
                const mesh = new THREE.Mesh(geometries[Math.floor(Math.random()*3)], mat);
                mesh.position.set((Math.random()-0.5)*110, (Math.random()-0.5)*90, (Math.random()-0.5)*60);
                mesh.userData = { speedY: 0.025 + Math.random()*0.07, rot: Math.random()*0.02 };
                scene.add(mesh); shapes.push(mesh);
            }
            scene.add(new THREE.PointLight(0xffffff, 1.2, 120), new THREE.AmbientLight(0xffffff, 0.3));
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(s => { s.position.y += s.userData.speedY; s.rotation.x += s.userData.rot; if(s.position.y > 45) s.position.y = -45; });
            renderer.render(scene, camera);
        }

        let allScripts = []; let pageNum = 1; let currentSearch = "";
        const blueStarSVG = `<svg viewBox="0 0 24 24" class="w-full h-full"><path d="M12 1L14.39 3.46L17.77 2.82L18.89 6.04L22.14 7.02L21.31 10.33L23 13.17L20.61 15.63L21.25 19.01L18.03 20.13L17.05 23.38L13.74 22.55L10.9 24.24L8.44 21.85L5.06 22.49L3.94 19.27L0.69 18.29L1.52 14.98L-0.17 12.14L2.22 9.68L1.58 6.3L4.8 5.18L5.78 1.93L9.09 2.76L11.93 1.07Z" fill="#1D9BF0"/><path d="M9.5 15.5l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4-7 7z" fill="white"/></svg>`;

        // NEW: Image Handling Logic
        function getScriptImage(s) {
            if (s.image && s.image.startsWith('http')) return s.image;
            if (s.game && s.game.imageUrl) return s.game.imageUrl.startsWith('//') ? 'https:' + s.game.imageUrl : s.game.imageUrl;
            return "https://via.placeholder.com/400x225/0a0a0a/333333?text=RETH+OFFICIAL";
        }

        async function fetchScripts(q = "", p = 1, append = false) {
            currentSearch = q; pageNum = p;
            if(!append) showSkeletons();
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=20&page=${p}` : `https://scriptblox.com/api/script/fetch?page=${p}&max=20`;
            try {
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(api)}`);
                const data = await response.json();
                const fetched = data.result.scripts || data.result.docs || [];
                allScripts = append ? [...allScripts, ...fetched] : fetched;
                document.getElementById('loadArea').classList.toggle('hidden', pageNum >= (data.result.totalPages || 1));
                render();
            } catch (err) { console.error(err); }
        }

        function showSkeletons() {
            document.getElementById('scriptGrid').innerHTML = Array(8).fill(0).map(() => `
                <div class="reth-card p-7 opacity-40">
                    <div class="aspect-video rounded-2xl skeleton mb-6"></div>
                    <div class="h-14 rounded-2xl skeleton"></div>
                </div>
            `).join('');
        }

        function render() {
            const grid = document.getElementById('scriptGrid');
            const onlyV = document.getElementById('fVer').checked;
            const onlyK = document.getElementById('fKey').checked;
            const filtered = allScripts.filter(s => (!onlyV || s.verified) && (!onlyK || s.key === false));

            grid.innerHTML = filtered.map((s, i) => {
                const img = getScriptImage(s); // USE THE NEW IMAGE LOGIC
                return `
                <div class="reth-card p-7" onclick="openModal(${i})">
                    <div class="relative aspect-video rounded-[24px] overflow-hidden mb-7 bg-zinc-900 border border-[var(--border-color)]">
                        ${s.verified ? `<div class="ver-badge">${blueStarSVG}</div>` : ""}
                        <div class="key-badge ${s.key ? 'bg-red-600 text-white' : 'bg-yellow-500 text-black'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <div class="status-badge"><div class="dot"></div> Working</div>
                        <img src="${img}" class="w-full h-full object-cover opacity-60 hover:opacity-100 transition duration-700">
                    </div>
                    <button class="btn-copy-main" onclick="event.stopPropagation(); quickCopy(${i})">Copy Script</button>
                    <h3 class="text-[14px] font-black uppercase truncate">${s.title}</h3>
                    <p class="text-[9px] font-bold text-zinc-600 truncate mt-2">${s.game.name}</p>
                </div>`;
            }).join('');
        }

        function quickCopy(idx) { navigator.clipboard.writeText(allScripts[idx].script); showToast(); }
        function copyFromModal() { navigator.clipboard.writeText(document.getElementById('mCode').innerText); showToast(); }
        function showToast() { const t = document.getElementById('toast'); t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('hidden'); }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('dBtn').classList.toggle('opacity-40', theme !== 'dark');
            document.getElementById('lBtn').classList.toggle('opacity-40', theme !== 'light');
            localStorage.setItem('reth-pref-theme', theme);
            shapes.forEach(s => s.material.color.set(theme === 'light' ? 0x222222 : 0x4f6b8f));
        }

        function openModal(idx) {
            const s = allScripts[idx];
            const img = getScriptImage(s); // USE THE NEW IMAGE LOGIC
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mImg').src = img;
            document.getElementById('mStats').innerHTML = `<span>Views: ${s.views.toLocaleString()}</span><span>Likes: ${s.likeCount}</span><span>Game: ${s.game.name}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- NO CODE --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            const modal = document.getElementById('modal');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => modal.classList.add('opacity-100'), 20);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal'); m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 400);
        }

        function loadMore() { fetchScripts(currentSearch, pageNum + 1, true); }

        let searchDebounce;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(() => fetchScripts(e.target.value), 700);
        });

        window.onload = () => { 
            init3D(); animate3D(); 
            setTheme(localStorage.getItem('reth-pref-theme') || 'dark');
            fetchScripts(); 
        };
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
