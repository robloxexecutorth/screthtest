<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — ORIGINAL UI FIXED</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #777777;
            --border-color: #1a1a1a;
            --search-bg: #0a0a0a;
            --modal-bg: #0d0d0d;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            transition: background-color 0.3s;
        }

        /* --- Nav Controls (เหมือนในรูป) --- */
        .nav-controls { position: absolute; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); }
        .t-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; }
        .discord-btn { background: #5865F2; color: white; padding: 8px 20px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }

        /* --- Header --- */
        .reth-title { font-size: 80px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; margin-bottom: 5px; }
        .reth-subtitle { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 0.4em; }

        /* --- Search Area --- */
        .search-container { display: flex; gap: 12px; max-width: 700px; margin: 50px auto; position: relative; }
        .reth-search { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 18px; color: #fff; font-size: 12px; font-weight: 600; flex: 1; padding: 20px 25px; outline: none; }
        .filter-btn { background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; padding: 0 25px; border-radius: 18px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- Card Design (ตามรูปเป๊ะ) --- */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; overflow: hidden; position: relative; transition: 0.3s; cursor: pointer; }
        .reth-card:hover { transform: translateY(-5px); border-color: #333; }
        
        .card-img-container { position: relative; aspect-ratio: 16/9; background: #111; overflow: hidden; }
        .card-img-container img { width: 100%; h-full: 100%; object-fit: cover; opacity: 0.6; }

        /* Badges inside Image */
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 20px; font-size: 8px; font-weight: 900; display: flex; align-items: center; gap: 5px; }
        .key-badge { position: absolute; bottom: 12px; left: 12px; padding: 4px 12px; border-radius: 6px; font-size: 8px; font-weight: 900; text-transform: uppercase; }
        .badge-keyless { background: #eab308; color: #000; }
        .badge-key { background: #ef4444; color: #fff; }
        .ver-badge { position: absolute; top: 12px; left: 12px; background: #3b82f6; color: white; padding: 4px; border-radius: 6px; }

        /* Card Content */
        .card-body { padding: 20px; }
        .btn-copy-white { background: #ffffff; color: #000000; width: 100%; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 15px; cursor: pointer; transition: 0.2s; }
        .btn-copy-white:hover { background: #e0e0e0; }

        .stats-row { display: flex; gap: 15px; font-size: 10px; font-weight: 800; color: #555; margin-bottom: 15px; }
        .stats-row i { font-size: 11px; }

        .script-title { font-size: 13px; font-weight: 900; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-title { font-size: 9px; font-weight: 700; color: #555; text-transform: uppercase; margin-top: 4px; }

        /* --- Load More --- */
        .load-more-container { display: flex; justify-content: center; padding: 50px 0; }
        .btn-load-more { background: transparent; border: 1px solid #1a1a1a; color: #fff; padding: 15px 35px; border-radius: 15px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-load-more:hover { border-color: #fff; }

        /* --- Modal & Menu --- */
        .float-filter-menu { position: absolute; top: calc(100% + 10px); right: 0; width: 250px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .float-filter-menu.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div class="nav-controls">
        <div onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</div>
        <div onclick="setTheme('light')" id="lBtn" class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">
            <i class="fa-brands fa-discord"></i> Discord
        </a>
    </div>

    <div class="max-w-7xl mx-auto px-6">
        <header class="pt-32 pb-16 text-center">
            <h1 class="reth-title">RETH</h1>
            <p class="reth-subtitle">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" class="filter-btn">Filter</button>
            <div id="filterMenu" class="float-filter-menu">
                <label class="flex justify-between py-2 cursor-pointer text-[10px] font-bold uppercase"><span>Verified</span><input type="checkbox" onchange="updateFilter('verified', this.checked)"></label>
                <label class="flex justify-between py-2 cursor-pointer text-[10px] font-bold uppercase"><span>Keyless</span><input type="checkbox" onchange="updateFilter('keyless', this.checked)"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        <div class="load-more-container" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" id="btnLoadMore" class="btn-load-more">Load More</button>
        </div>

        <footer class="py-20 text-center border-t border-[#1a1a1a] mt-20">
            <p class="text-[9px] font-black text-[#444] uppercase tracking-widest">Powered by ScriptBlox & Reth Official</p>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="bg-[#0d0d0d] border border-[#1a1a1a] rounded-[30px] max-w-2xl w-full p-10 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-2"></h2>
            <div id="mStats" class="stats-row mb-6"></div>
            <div class="flex gap-4 mb-8">
                <button id="mCopy" onclick="copyFromModal()" class="bg-white text-black flex-1 py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border border-zinc-800 rounded-xl flex items-center justify-center text-[11px] font-black uppercase">Source</a>
            </div>
            <div id="mCode" class="bg-black p-6 rounded-2xl font-mono text-xs text-zinc-500 max-h-[250px] overflow-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let scripts = [];
        let filters = { verified: false, keyless: false };
        let currentPage = 1;
        let currentQuery = "";

        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('show'); }
        function updateFilter(k, v) { filters[k] = v; apply(); }
        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = m === 'dark' ? 't-btn active' : 't-btn';
            document.getElementById('lBtn').className = m === 'light' ? 't-btn active' : 't-btn';
        }

        async function load(q = "", page = 1, append = false) {
            currentQuery = q;
            currentPage = page;
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=20&page=${page}` : `https://scriptblox.com/api/script/fetch?page=${page}&max=20`;
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                const newScripts = data.result.scripts || data.result.docs || [];
                scripts = append ? [...scripts, ...newScripts] : newScripts;
                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 0)) ? 'flex' : 'none';
                apply();
            } catch (e) { console.error("Error"); }
        }

        function loadMore() {
            document.getElementById('btnLoadMore').innerText = "LOADING...";
            load(currentQuery, currentPage + 1, true).then(() => { document.getElementById('btnLoadMore').innerText = "Load More"; });
        }

        function apply() {
            const f = scripts.filter(s => {
                if (filters.verified && !s.verified) return false;
                if (filters.keyless && s.key !== false) return false;
                return true;
            });
            render(f);
        }

        function render(list) {
            let html = "";
            list.forEach((s) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                const keyClass = s.key ? 'badge-key' : 'badge-keyless';
                const keyText = s.key ? 'Key' : 'Keyless';
                const idx = scripts.indexOf(s);
                
                html += `
                <div class="reth-card" onclick="openModal(${idx})">
                    <div class="card-img-container">
                        ${s.verified ? '<div class="ver-badge"><i class="fa-solid fa-check text-[10px]"></i></div>' : ''}
                        <div class="status-badge"><span class="w-1.5 h-1.5 rounded-full ${s.isPatched ? 'bg-red-500' : 'bg-green-500'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <div class="key-badge ${keyClass}">${keyText}</div>
                        <img src="${thumb}">
                    </div>
                    <div class="card-body">
                        <div class="stats-row">
                            <span><i class="fa-solid fa-eye"></i> ${s.views.toLocaleString()}</span>
                            <span class="text-green-500"><i class="fa-solid fa-thumbs-up"></i> ${s.likeCount}</span>
                            <span class="text-red-500"><i class="fa-solid fa-thumbs-down"></i> ${s.dislikeCount}</span>
                        </div>
                        <div class="btn-copy-white" onclick="event.stopPropagation(); quickCopy(${idx}, this)">Copy Loadstring</div>
                        <h3 class="script-title">${s.title}</h3>
                        <p class="game-title">${s.game.name}</p>
                    </div>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html || '<p class="col-span-full text-center py-20 opacity-20">NO RESULTS</p>';
        }

        function openModal(idx) {
            const s = scripts[idx];
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mStats').innerHTML = `<span>👁 ${s.views.toLocaleString()}</span> | <span class="text-green-500">👍 ${s.likeCount}</span> | <span class="text-red-500">👎 ${s.dislikeCount}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- No Data --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function quickCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!"; btn.style.background = "#22c55e"; btn.style.color = "#fff";
                setTimeout(() => { btn.innerText = old; btn.style.background = "#fff"; btn.style.color = "#000"; }, 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                const btn = document.getElementById('mCopy'); btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Script", 1500);
            });
        }

        let debounce;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounce);
            debounce = setTimeout(() => load(e.target.value, 1, false), 500);
        });

        window.onload = () => load("", 1, false);
    </script>
</body>
</html>
