<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — KEY & KEYLESS STATUS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; transition: background-color 0.3s; }

        /* --- Search & Filter --- */
        .search-container { display: flex; gap: 12px; max-width: 650px; margin: 0 auto 60px auto; position: relative; }
        .reth-search { background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; flex: 1; padding: 22px 28px; outline: none; transition: 0.3s; }
        .reth-search:focus { border-color: var(--accent); }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 0 25px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }

        /* --- Badges on Cover --- */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; transition: 0.3s; overflow: hidden; position: relative; cursor: pointer; }
        .reth-card:hover { transform: translateY(-5px); border-color: var(--text-dim); }
        .reth-card img { opacity: 0.5; transition: 0.5s; }
        
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 5px 10px; font-size: 9px; font-weight: 900; z-index: 10; display: flex; align-items: center; gap: 6px; }
        
        /* Verified */
        .ver-badge-cover { position: absolute; top: 12px; left: 12px; background: #3b82f6; color: white; border-radius: 8px; padding: 5px; z-index: 20; display: flex; align-items: center; justify-content: center; }
        
        /* Key / Keyless Badge Base */
        .key-info-badge { position: absolute; top: 12px; left: 45px; border-radius: 8px; padding: 4px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Keyless Style (Yellow) */
        .badge-keyless { background: #eab308; color: black; }
        
        /* Key Style (Red) */
        .badge-has-key { background: #ef4444; color: white; }

        /* Offset if no Verified badge */
        .no-ver .key-info-badge { left: 12px; }

        .dot { height: 6px; width: 6px; border-radius: 50%; }
        .dot.working { background: #22c55e; }
        .dot.patched { background: #ef4444; }

        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
        .btn-copy { background: var(--text-main); color: var(--bg-color); text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; }

        /* --- Header & Nav --- */
        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        .nav-controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }
        
        /* Floating Menu */
        .float-filter-menu { position: absolute; top: calc(100% + 15px); right: 0; width: 280px; background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 20px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); visibility: hidden; opacity: 0; transition: 0.3s; }
        .float-filter-menu.show { visibility: visible; opacity: 1; }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <div onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</div>
        <div onclick="setTheme('light')" id="lBtn" class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase">Discord</a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" id="filterBtn" class="filter-btn">Filter</button>
            <div id="filterMenu" class="float-filter-menu">
                <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3">Quick Filters</h3>
                <label class="flex justify-between py-2"><span>Verified</span><input type="checkbox" onchange="updateFilter('verified', this.checked)"></label>
                <label class="flex justify-between py-2"><span>Keyless</span><input type="checkbox" onchange="updateFilter('keyless', this.checked)"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <script>
        let scripts = [];
        let filters = { verified: false, keyless: false };
        const verSVG = `<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.067.87a2.89 2.89 0 0 0-4.134 0l-.622.638-.89-.011a2.89 2.89 0 0 0-2.924 2.924l.01.89-.636.622a2.89 2.89 0 0 0 0 4.134l.637.622-.011.89a2.89 2.89 0 0 0 2.924 2.924l.89-.01.622.636a2.89 2.89 0 0 0 4.134 0l.622-.637.89.011a2.89 2.89 0 0 0 2.924-2.924l-.01-.89.636-.622a2.89 2.89 0 0 0 0-4.134l-.637-.622.011-.89a2.89 2.89 0 0 0-2.924-2.924l-.89.01-.622-.636zm.287 5.984-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708.708z"/></svg>`;

        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('show'); }
        function updateFilter(k, v) { filters[k] = v; apply(); }

        async function load(q = "") {
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=50` : "https://scriptblox.com/api/script/fetch?page=1&max=50";
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                scripts = data.result.scripts || data.result.docs || [];
                apply();
            } catch (e) { console.error(e); }
        }

        function apply() {
            const f = scripts.filter(s => {
                if (filters.verified && !s.verified) return false;
                if (filters.keyless && s.key !== false) return false;
                return true;
            });
            render(f);
        }

        function render(list) {
            let html = "";
            list.forEach((s) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                const vBadge = s.verified ? `<div class="ver-badge-cover">${verSVG}</div>` : "";
                
                // --- ระบบเช็ค Key ---
                // ถ้า s.key เป็น true ให้ขึ้นป้าย "Key" (สีแดง)
                // ถ้า s.key เป็น false ให้ขึ้นป้าย "Keyless" (สีเหลือง)
                const keyBadge = s.key ? 
                    `<div class="key-info-badge badge-has-key">Key</div>` : 
                    `<div class="key-info-badge badge-keyless">Keyless</div>`;
                
                html += `
                <div class="reth-card p-6 ${!s.verified ? 'no-ver' : ''}">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900">
                        ${vBadge}
                        ${keyBadge}
                        <div class="status-badge"><span class="dot ${s.isPatched ? 'patched' : 'working'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="stats-row">
                        <span>👁 ${s.views.toLocaleString()}</span>
                        <span class="text-green-500">👍 ${s.likeCount}</span>
                    </div>
                    <div class="btn-copy" onclick="quickCopy('${s.script}', this)">Copy Script</div>
                    <h3 class="text-sm font-black uppercase truncate">${s.title}</h3>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html;
        }

        function quickCopy(code, btn) {
            navigator.clipboard.writeText(code).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!"; btn.style.background = "#22c55e";
                setTimeout(() => { btn.innerText = old; btn.style.background = ""; }, 1500);
            });
        }

        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = m === 'dark' ? 't-btn active' : 't-btn';
            document.getElementById('lBtn').className = m === 'light' ? 't-btn active' : 't-btn';
        }

        document.getElementById('searchInput').addEventListener('input', (e) => load(e.target.value));
        window.onload = () => load("");
    </script>
</body>
</html>
