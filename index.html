<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0px; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* --- Navigation Controls --- */
        .nav-controls {
            position: fixed; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 12px; z-index: 100;
        }
        .theme-toggle {
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px;
        }
        .t-btn {
            padding: 8px 12px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; color: var(--text-dim); transition: 0.2s;
        }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        .discord-btn { 
            background: #5865F2; color: white;
            padding: 12px 24px; border-radius: 14px;
            font-size: 11px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.1em; 
            display: flex; align-items: center; gap: 10px; 
            transition: all 0.3s ease; text-decoration: none; 
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.4); 
        }

        /* --- Card Styles & Fixing Opacity --- */
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 24px; transition: 0.3s; height: 100%; 
            display: flex; flex-direction: column; overflow: hidden; 
            position: relative; cursor: pointer; 
        }
        .reth-card:hover { border-color: var(--text-dim); transform: translateY(-5px); }

        /* แยกส่วนรูปภาพให้จางลง แต่ป้ายสถานะยังชัด */
        .reth-card img {
            opacity: 0.5;
            transition: opacity 0.5s ease;
        }
        .reth-card:hover img {
            opacity: 0.85;
        }

        .status-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 5px 12px; font-size: 9px;
            font-weight: 900; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px; 
            backdrop-filter: blur(8px); z-index: 20; color: #ffffff;
        }
        .status-dot { height: 6px; width: 6px; border-radius: 50%; }
        .status-dot.working { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-dot.patched { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .key-tag { position: absolute; top: 12px; left: 12px; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 5px 10px; border-radius: 8px; z-index: 20; }
        .key-required { background-color: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.4); }
        .keyless { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }

        /* --- Typography & UI --- */
        .reth-title { font-size: 85px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        .reth-title-underline { height: 2px; width: 120px; background-color: var(--border-color); margin-top: -10px; }
        .reth-subtitle { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5em; margin-top: 15px; }
        
        .reth-search { background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; width: 100%; padding: 26px; outline: none; }
        
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; }
        .stat-like { color: #4ade80; } .stat-dislike { color: #f87171; }

        .btn-copy-main { background-color: var(--text-main); color: var(--bg-color); text-align: center; padding: 14px 0; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        
        .modal-content { background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 30px; max-width: 650px; width: 95%; padding: 40px; color: var(--text-main); }
        .script-box { background: #000000; border: 1px solid #111111; border-radius: 16px; padding: 20px; font-family: monospace; font-size: 12px; color: #777777; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <div class="theme-toggle">
            <div id="darkBtn" class="t-btn active" onclick="setTheme('dark')">Dark</div>
            <div id="lightBtn" class="t-btn" onclick="setTheme('light')">Light</div>
        </div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.545 2.907a13.227 13.227 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.19 12.19 0 0 0-3.658 0 8.258 8.258 0 0 0-.412-.833.051.051 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.041.041 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032c.001.014.01.028.021.037a13.276 13.276 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019c.308-.42.582-.863.818-1.329a.05.05 0 0 0-.01-.059.051.051 0 0 0-.018-.011 8.875 8.875 0 0 1-1.248-.595.05.05 0 0 1-.02-.066.051.051 0 0 1 .015-.019c.084-.063.168-.129.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.052.052 0 0 1 .053.007c.08.066.164.132.248.195a.051.051 0 0 1-.004.085 8.254 8.254 0 0 1-1.249.594.05.05 0 0 0-.03.03.052.052 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.235 13.235 0 0 0 4.001-2.02.049.049 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.034.034 0 0 0-.02-.019Zm-8.198 7.307c-.789 0-1.438-.724-1.438-1.612 0-.889.637-1.613 1.438-1.613.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612Zm5.316 0c-.788 0-1.438-.724-1.438-1.612 0-.889.637-1.613 1.438-1.613.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612Z"/>
            </svg>
            Join Discord
        </a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-16 md:py-24 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <div class="reth-title-underline"></div>
            <p class="reth-subtitle">OFFICIAL SCRIPT HUB</p>
            <p class="text-[9px] font-extrabold text-zinc-800 uppercase tracking-widest mt-8">Powered by Scriptblox</p>
        </header>

        <div class="max-w-[600px] mx-auto mb-16">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <div id="scriptModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="modal-content relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-zinc-600 hover:text-white font-bold uppercase text-[10px] tracking-widest">Close [X]</button>
            <h2 id="modalTitle" class="text-2xl font-black uppercase italic mb-2 tracking-tighter"></h2>
            <div id="modalStats" class="stats-row mb-3"></div>
            <p id="modalGame" class="text-[11px] text-zinc-500 font-bold uppercase tracking-widest mb-10"></p>
            <div class="flex gap-4 mb-8">
                <div onclick="copyFromModal()" id="modalCopyBtn" class="btn-copy-main flex-1 mb-0">COPY SCRIPT</div>
                <a href="#" id="modalWebLink" target="_blank" class="px-8 border border-zinc-800 rounded-xl flex items-center text-[11px] font-black uppercase text-white hover:bg-zinc-900 justify-center">VIEW WEB</a>
            </div>
            <div class="space-y-3">
                <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest">Source Code Output:</p>
                <div id="modalScript" class="script-box"></div>
            </div>
        </div>
    </div>

    <script>
        var scriptGridElement = document.getElementById('scriptGrid');
        var modalElement = document.getElementById('scriptModal');
        var searchInputBox = document.getElementById('searchInput');
        var scriptsArrayData = [];

        function setTheme(mode) {
            var body = document.body;
            var d = document.getElementById('darkBtn');
            var l = document.getElementById('lightBtn');
            if (mode === 'light') {
                body.setAttribute('data-theme', 'light');
                l.classList.add('active'); d.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                d.classList.add('active'); l.classList.remove('active');
            }
        }

        async function fetchScriptsFromServer(searchQuery) {
            var api = searchQuery ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(searchQuery) + "&max=50" : "https://scriptblox.com/api/script/fetch?page=1&max=50";
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);
            try {
                var response = await fetch(proxy);
                var jsonData = await response.json();
                if (jsonData && jsonData.result) {
                    scriptsArrayData = jsonData.result.scripts || jsonData.result.docs || [];
                    renderScriptsToUI(scriptsArrayData);
                }
            } catch (error) { console.error("Error:", error); }
        }

        function formatNum(num) { return (num || 0).toLocaleString(); }

        function renderScriptsToUI(list) {
            var html = "";
            list.forEach((item, i) => {
                var thumb = item.image && !item.image.includes('http') ? "https://scriptblox.com" + item.image : (item.game && item.game.imageUrl ? item.game.imageUrl : "https://via.placeholder.com/400x225/050505/222222?text=RETH+HUB");
                var statusHtml = item.isPatched ? '<span class="status-dot patched"></span> Patched' : '<span class="status-dot working"></span> Working';

                html += `
                <div class="reth-card p-6 group" onclick="openScriptDetailModal(${i})">
                    <div class="relative aspect-video bg-black rounded-2xl mb-5 overflow-hidden">
                        <div class="key-tag ${item.key ? 'key-required' : 'keyless'}">${item.key ? 'Key Required' : 'Keyless'}</div>
                        <div class="status-badge">${statusHtml}</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="stats-row">
                        <span>👁 ${formatNum(item.views)}</span>
                        <span class="stat-like">👍 ${formatNum(item.likeCount)}</span>
                        <span class="stat-dislike">👎 ${formatNum(item.dislikeCount)}</span>
                    </div>
                    <div class="btn-copy-main" onclick="event.stopPropagation(); copyFromCard(${i}, this)">COPY LOADSTRING</div>
                    <div class="flex-grow">
                        <h3 class="text-sm font-black uppercase truncate mb-1 tracking-tight">${item.title}</h3>
                        <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest truncate">${item.game ? item.game.name : "Universal"}</p>
                    </div>
                </div>`;
            });
            scriptGridElement.innerHTML = html || '<p class="text-center col-span-full py-20 uppercase font-black text-zinc-700">No scripts found.</p>';
        }

        function openScriptDetailModal(index) {
            var s = scriptsArrayData[index];
            document.getElementById('modalTitle').innerText = s.title;
            document.getElementById('modalGame').innerText = s.game ? s.game.name : 'Universal Script';
            document.getElementById('modalScript').innerText = s.script || "-- No Script Provided --";
            document.getElementById('modalWebLink').href = "https://scriptblox.com/script/" + s.slug;
            document.getElementById('modalStats').innerHTML = `<span>${formatNum(s.views)} VIEWS</span><span class="stat-like">${formatNum(s.likeCount)} LIKES</span><span class="stat-dislike">${formatNum(s.dislikeCount)} DISLIKES</span>`;
            modalElement.classList.remove('hidden');
            setTimeout(() => modalElement.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalElement.classList.remove('opacity-100');
            setTimeout(() => { modalElement.classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function copyFromModal() {
            var code = document.getElementById('modalScript').innerText;
            var btn = document.getElementById('modalCopyBtn');
            navigator.clipboard.writeText(code).then(() => {
                btn.innerText = "COPIED!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
                setTimeout(() => { btn.innerText = "COPY SCRIPT"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 2000);
            });
        }

        function copyFromCard(index, btn) {
            navigator.clipboard.writeText(scriptsArrayData[index].script).then(() => {
                btn.innerText = "COPIED!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
                setTimeout(() => { btn.innerText = "COPY LOADSTRING"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 1500);
            });
        }

        var searchTimer;
        searchInputBox.addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => fetchScriptsFromServer(e.target.value), 500);
        });

        window.onload = () => fetchScriptsFromServer("");
    </script>
</body>
</html>
