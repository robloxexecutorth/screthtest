<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — 3D SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(10, 10, 10, 0.7);
            --text-main: #ffffff;
            --text-dim: #888888;
            --border-color: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(15, 15, 15, 0.95);
            --code-bg: #000000;
            --code-text: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #000000;
            --text-dim: #555555;
            --border-color: #000000;
            --modal-bg: #ffffff;
            --code-bg: #ffffff;
            --code-text: #000000;
        }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; }
        
        /* 3D Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        
        .nav-controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); transition: 0.2s; backdrop-filter: blur(5px); }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        .search-container { display: flex; gap: 12px; max-width: 650px; margin: 0 auto 60px auto; position: relative; width: 100%; z-index: 10; }
        .reth-search { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; flex: 1; padding: 22px 28px; backdrop-filter: blur(10px); }
        
        /* Card System */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; position: relative; cursor: pointer; backdrop-filter: blur(10px); }
        .reth-card:hover { transform: translateY(-10px); border-color: var(--text-main); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .ver-badge { position: absolute; top: 12px; left: 12px; width: 26px; height: 26px; z-index: 30; }
        .key-badge { position: absolute; top: 12px; left: 45px; border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .bg-keyless { background: #eab308; color: black; }
        .bg-key { background: #ef4444; color: white; }

        .btn-copy-white { background: #ffffff; color: #000000; border: 1.5px solid var(--border-color); text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; width: 100%; display: block; }

        /* Modal */
        #modal { backdrop-filter: blur(15px); }
        #mCode { background: var(--code-bg); color: var(--code-text); border: 2px solid var(--border-color); padding: 20px; border-radius: 18px; font-family: monospace; font-size: 10px; max-height: 180px; overflow: auto; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 30px; border-radius: 50px; font-size: 11px; font-weight: 900; z-index: 3000; display: none; }
    </style>
</head>
<body class="p-6 md:p-16">

    <canvas id="bg-canvas"></canvas>
    <div id="toast">Copied to Clipboard!</div>

    <div class="nav-controls">
        <button onclick="updateTheme('dark')" id="dBtn" class="t-btn">Dark</button>
        <button onclick="updateTheme('light')" id="lBtn" class="t-btn">Light</button>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase flex items-center"><i class="fa-brands fa-discord mr-2"></i> Discord</a>
    </div>

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" class="t-btn !px-6 !py-0 !rounded-2xl">Filter</button>
            <div id="filterMenu" class="absolute top-full mt-4 right-0 w-64 bg-[var(--modal-bg)] border border-[var(--border-color)] rounded-2xl p-5 hidden z-50">
                <label class="flex justify-between py-2 text-[10px] font-black uppercase">Verified Only <input type="checkbox" id="fVer" onchange="render()"></label>
                <label class="flex justify-between py-2 text-[10px] font-black uppercase">Keyless Only <input type="checkbox" id="fKey" onchange="render()"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        
        <div class="flex justify-center py-24" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" class="t-btn !px-12 !py-5 !text-[11px] !rounded-full hover:scale-105 transition-transform">Load More Scripts</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6 bg-black/80 opacity-0 transition-opacity duration-300">
        <div class="bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-[40px] max-w-2xl w-full p-10 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-4"></h2>
            <div id="mImgContainer" class="aspect-video rounded-2xl overflow-hidden border-2 border-[var(--border-color)] mb-6 bg-black">
                <img id="mImg" src="" class="w-full h-full object-cover">
            </div>
            <div class="flex gap-4 mb-6">
                <button onclick="copyFromModal()" class="bg-white text-black border-2 border-[var(--border-color)] flex-1 py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border-2 border-[var(--border-color)] rounded-xl flex items-center justify-center text-[11px] font-black uppercase">Source</a>
            </div>
            <div id="mCode"></div>
        </div>
    </div>

    <script>
        // --- 3D BACKGROUND ENGINE (Three.js) ---
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const shapes = [];

        function init3D() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = 30;
            
            const geometryPool = [
                new THREE.IcosahedronGeometry(2, 0),
                new THREE.BoxGeometry(3, 3, 3),
                new THREE.TetrahedronGeometry(2.5)
            ];

            for(let i=0; i<40; i++) {
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x4f6b8f, wireframe: true, transparent: true, opacity: 0.2 
                });
                const mesh = new THREE.Mesh(geometryPool[Math.floor(Math.random()*3)], material);
                mesh.position.set((Math.random()-0.5)*80, (Math.random()-0.5)*60, (Math.random()-0.5)*40);
                mesh.userData = { speedY: 0.02 + Math.random()*0.05, rot: Math.random()*0.01 };
                scene.add(mesh);
                shapes.push(mesh);
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(s => {
                s.position.y += s.userData.speedY;
                s.rotation.x += s.userData.rot;
                s.rotation.y += s.userData.rot;
                if(s.position.y > 35) s.position.y = -35;
            });
            renderer.render(scene, camera);
        }

        // --- SCRIPTBLOX ENGINE ---
        let allScripts = []; let currentPage = 1; let currentQuery = "";
        const verStar = `<svg viewBox="0 0 24 24" class="w-full h-full" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L14.39 3.46L17.77 2.82L18.89 6.04L22.14 7.02L21.31 10.33L23 13.17L20.61 15.63L21.25 19.01L18.03 20.13L17.05 23.38L13.74 22.55L10.9 24.24L8.44 21.85L5.06 22.49L3.94 19.27L0.69 18.29L1.52 14.98L-0.17 12.14L2.22 9.68L1.58 6.3L4.8 5.18L5.78 1.93L9.09 2.76L11.93 1.07Z" fill="#1D9BF0"/><path d="M9.5 15.5l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4-7 7z" fill="white"/></svg>`;

        async function fetchScripts(q = "", p = 1, append = false) {
            currentQuery = q; currentPage = p;
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=20&page=${p}` : `https://scriptblox.com/api/script/fetch?page=${p}&max=20`;
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(api)}`);
                const data = await res.json();
                const scripts = data.result.scripts || data.result.docs || [];
                allScripts = append ? [...allScripts, ...scripts] : scripts;
                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 1)) ? 'flex' : 'none';
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const grid = document.getElementById('scriptGrid');
            const fV = document.getElementById('fVer').checked;
            const fK = document.getElementById('fKey').checked;
            const filtered = allScripts.filter(s => (!fV || s.verified) && (!fK || s.key === false));

            grid.innerHTML = filtered.map((s, i) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                return `
                <div class="reth-card p-6" onclick="openModal(${i})">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900 border-2 border-[var(--border-color)]">
                        ${s.verified ? `<div class="ver-badge">${verStar}</div>` : ""}
                        <div class="key-badge ${s.key ? 'bg-key' : 'bg-keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <img src="${thumb}" class="w-full h-full object-cover opacity-60">
                    </div>
                    <div class="btn-copy-white" onclick="event.stopPropagation(); quickCopy(${i})">Copy Script</div>
                    <h3 class="text-xs font-black uppercase truncate">${s.title}</h3>
                </div>`;
            }).join('');
        }

        // --- UTILS ---
        function updateTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').classList.toggle('active', m === 'dark');
            document.getElementById('lBtn').classList.toggle('active', m === 'light');
            localStorage.setItem('reth-theme', m);
            // ปรับสี 3D ตามธีม
            shapes.forEach(s => s.material.color.set(m === 'light' ? 0x000000 : 0x4f6b8f));
        }

        function openModal(i) {
            const s = allScripts[i];
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mCode').innerText = s.script;
            document.getElementById('mImg').src = s.game.imageUrl || "";
            document.getElementById('mLink').href = `https://scriptblox.com/script/${s.slug}`;
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100');
            setTimeout(() => m.classList.replace('flex', 'hidden'), 300);
        }

        function quickCopy(i) { navigator.clipboard.writeText(allScripts[i].script); showToast(); }
        function copyFromModal() { navigator.clipboard.writeText(document.getElementById('mCode').innerText); showToast(); }
        function showToast() { const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('hidden'); }
        function loadMore() { fetchScripts(currentQuery, currentPage + 1, true); }

        window.onload = () => {
            init3D(); animate3D();
            updateTheme(localStorage.getItem('reth-theme') || 'dark');
            fetchScripts();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let db; document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(db); db = setTimeout(() => fetchScripts(e.target.value, 1, false), 500);
        });
    </script>
</body>
</html>
