<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
        }

        /* --- Navigation --- */
        .nav-controls { position: absolute; top: 30px; right: 30px; display: flex; gap: 12px; z-index: 100; }
        .t-btn { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 10px 20px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; }
        .t-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; }
        .discord-btn { background: #5865F2; color: white; padding: 10px 24px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; text-decoration: none; }

        /* --- Header --- */
        .reth-title { font-size: 85px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; margin-bottom: 8px; }
        .reth-subtitle { font-size: 10px; font-weight: 800; color: #444; text-transform: uppercase; letter-spacing: 0.5em; }

        /* --- Search Area --- */
        .search-container { display: flex; gap: 15px; max-width: 700px; margin: 60px auto; }
        .reth-search { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 18px; color: #fff; font-size: 12px; font-weight: 700; flex: 1; padding: 22px 30px; outline: none; text-transform: uppercase; }
        .filter-btn { background: #0a0a0a; border: 1px solid #1a1a1a; color: #fff; padding: 0 30px; border-radius: 18px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- Card Design (Fixed UI) --- */
        .reth-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 30px; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .reth-card:hover { transform: translateY(-8px); border-color: #333; }
        
        .card-img-wrapper { position: relative; aspect-ratio: 16/9; background: #000; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }

        .status-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; font-size: 8px; font-weight: 900; display: flex; align-items: center; gap: 6px; text-transform: uppercase; }
        .key-badge { position: absolute; bottom: 15px; left: 15px; padding: 5px 12px; border-radius: 6px; font-size: 8px; font-weight: 900; text-transform: uppercase; }
        .badge-keyless { background: #eab308; color: #000; }
        .badge-key { background: #ef4444; color: #fff; }

        .card-info { padding: 25px; }
        .btn-copy-action { background: #ffffff; color: #000000; width: 100%; padding: 14px; border-radius: 15px; font-size: 11px; font-weight: 900; text-transform: uppercase; text-align: center; margin-bottom: 20px; cursor: pointer; }

        .stats-group { display: flex; gap: 15px; font-size: 10px; font-weight: 800; color: #444; margin-bottom: 18px; }
        .script-name { font-size: 14px; font-weight: 900; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
        .game-name { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }

        /* --- Footer --- */
        .btn-load-more { background: transparent; border: 1px solid #1a1a1a; color: #fff; padding: 18px 45px; border-radius: 20px; font-size: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin: 50px auto; display: block; }
        .btn-load-more:hover { border-color: #fff; }
        
        .footer-text { font-size: 10px; font-weight: 900; color: #222; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 60px; }

        /* --- Modal --- */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0d0d0d; border: 1px solid #1a1a1a; width: 100%; max-width: 600px; padding: 40px; border-radius: 35px; position: relative; }
    </style>
</head>
<body>

    <nav class="nav-controls">
        <div class="t-btn active">Dark</div>
        <div class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">
            <i class="fa-brands fa-discord"></i> Discord
        </a>
    </nav>

    <div class="max-w-7xl mx-auto px-8">
        <header class="pt-40 pb-10 text-center">
            <h1 class="reth-title">RETH</h1>
            <p class="reth-subtitle">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button class="filter-btn">Filter</button>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>

        <div id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" id="btnLoadMore" class="btn-load-more">Load More Scripts</button>
        </div>

        <footer class="text-center mt-20">
            <p class="footer-text">Powered by ScriptBlox & Reth Official</p>
        </footer>
    </div>

    <div id="modal">
        <div class="modal-content text-center">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-600 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-6"></h2>
            <div id="mCode" class="bg-black p-6 rounded-2xl font-mono text-[10px] text-zinc-500 max-h-[300px] overflow-auto text-left mb-6"></div>
            <button onclick="copyFromModal()" id="mCopy" class="btn-copy-action">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        let scripts = [];
        let currentPage = 1;
        let currentQuery = "";

        async function load(q = "", page = 1, append = false) {
            currentQuery = q;
            currentPage = page;
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=15&page=${page}` : `https://scriptblox.com/api/script/fetch?page=${page}&max=15`;
            
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                const newScripts = data.result.scripts || data.result.docs || [];
                scripts = append ? [...scripts, ...newScripts] : newScripts;
                
                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 0)) ? 'block' : 'none';
                render();
            } catch (e) { console.error("Error"); }
        }

        function render() {
            let html = "";
            scripts.forEach((s, idx) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                html += `
                <div class="reth-card" onclick="openModal(${idx})">
                    <div class="card-img-wrapper">
                        <div class="status-badge"><span class="w-1.5 h-1.5 rounded-full ${s.isPatched ? 'bg-red-500' : 'bg-green-500'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <div class="key-badge ${s.key ? 'badge-key' : 'badge-keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <img src="${thumb}">
                    </div>
                    <div class="card-info">
                        <div class="btn-copy-action" onclick="event.stopPropagation(); quickCopy(${idx}, this)">Copy Loadstring</div>
                        <div class="stats-group">
                            <span><i class="fa-solid fa-eye mr-1"></i> ${s.views.toLocaleString()}</span>
                            <span class="text-green-600"><i class="fa-solid fa-thumbs-up mr-1"></i> ${s.likeCount}</span>
                            <span class="text-red-600"><i class="fa-solid fa-thumbs-down mr-1"></i> ${s.dislikeCount}</span>
                        </div>
                        <h3 class="script-name">${s.title}</h3>
                        <p class="game-name">${s.game.name}</p>
                    </div>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html;
        }

        function loadMore() {
            document.getElementById('btnLoadMore').innerText = "Loading...";
            load(currentQuery, currentPage + 1, true).then(() => {
                document.getElementById('btnLoadMore').innerText = "Load More Scripts";
            });
        }

        function openModal(idx) {
            const s = scripts[idx];
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mCode').innerText = s.script;
            document.getElementById('modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function quickCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script).then(() => {
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy Loadstring", 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                document.getElementById('mCopy').innerText = "Copied!";
                setTimeout(() => document.getElementById('mCopy').innerText = "Copy to Clipboard", 1500);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(() => load(e.target.value, 1, false), 500);
        });

        window.onload = () => load();
    </script>
</body>
</html>
