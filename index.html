<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- การจัดการระบบธีมด้วย CSS Variables --- */
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #666666;
            --border-color: #1a1a1a;
            --search-bg: #080808;
            --modal-bg: rgba(5, 5, 5, 0.95);
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #71717a;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Theme Switcher (มุมขวาบน) --- */
        .theme-container {
            position: fixed; top: 25px; right: 220px;
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px; z-index: 100;
        }
        .theme-btn {
            padding: 8px 16px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; transition: 0.2s; color: var(--text-dim);
        }
        .theme-btn.active {
            background: var(--text-main); color: var(--bg-color);
        }

        /* --- Discord Button --- */
        .discord-btn { 
            position: fixed; top: 25px; right: 25px;
            background: #5865F2; color: white;
            padding: 12px 24px; border-radius: 14px;
            font-size: 11px; font-weight: 900;
            text-transform: uppercase; z-index: 100;
            text-decoration: none; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        /* --- Search Bar --- */
        .reth-search { 
            background: var(--search-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; color: var(--text-main);
            width: 100%; padding: 26px; outline: none;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.15em; transition: 0.3s;
        }
        .reth-search:focus { border-color: var(--text-dim); }

        /* --- Card UI --- */
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 24px; display: flex; flex-direction: column;
            overflow: hidden; transition: 0.3s; cursor: pointer; height: 100%;
        }
        .reth-card:hover { transform: translateY(-5px); border-color: var(--text-dim); }

        .card-image-area { position: relative; aspect-ratio: 16/9; background: #000; overflow: hidden; }
        .card-image-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .reth-card:hover img { opacity: 1; }

        /* ป้ายสถานะบนรูป */
        .tag-common { position: absolute; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 5px 10px; border-radius: 8px; backdrop-filter: blur(4px); }
        .tag-key { top: 12px; left: 12px; background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .tag-keyless { top: 12px; left: 12px; background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-badge { top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #333; }

        .btn-copy {
            background: var(--text-main); color: var(--bg-color);
            text-align: center; padding: 14px; border-radius: 14px;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
            margin: 15px 0; transition: 0.2s;
        }

        /* --- Modal UI --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; items-center; justify-center; }
        .modal-content { 
            background: var(--modal-bg); border: 1px solid var(--border-color);
            border-radius: 30px; max-width: 700px; width: 90%; 
            padding: 40px; position: relative; backdrop-filter: blur(10px);
        }
        .script-box { 
            background: #000; border: 1px solid #1a1a1a; border-radius: 16px;
            padding: 20px; font-family: monospace; font-size: 12px; color: #888;
            max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="theme-container">
        <div id="darkBtn" class="theme-btn active" onclick="updateTheme('dark')">Dark</div>
        <div id="lightBtn" class="theme-btn" onclick="updateTheme('light')">Light</div>
    </div>

    <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">JOIN DISCORD</a>

    <div class="max-w-7xl mx-auto">
        <header class="py-16 text-center">
            <h1 class="text-7xl md:text-8xl font-black italic italic mb-2 tracking-tighter">RETH</h1>
            <p class="text-[10px] font-bold tracking-[0.5em] text-zinc-500 uppercase">Official Script Hub</p>
        </header>

        <div class="max-w-2xl mx-auto mb-20">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </div>

    <div id="detailModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black uppercase text-zinc-500 hover:text-white">Close [X]</button>
            <h2 id="m-title" class="text-3xl font-black uppercase italic mb-2"></h2>
            <div id="m-stats" class="flex gap-4 text-[10px] font-extrabold text-zinc-500 mb-6 uppercase"></div>
            
            <div class="flex gap-4 mb-8">
                <button id="m-copy" onclick="copyFromModal()" class="flex-1 bg-white text-black py-4 rounded-xl font-black text-[11px] uppercase">Copy Script</button>
                <a id="m-web" href="#" target="_blank" class="px-8 border border-zinc-800 rounded-xl flex items-center justify-center font-black text-[11px] uppercase">View Web</a>
            </div>

            <p class="text-[9px] font-black text-zinc-600 uppercase mb-2">Source Code:</p>
            <div id="m-code" class="script-box"></div>
        </div>
    </div>

    <script>
        var scriptsArray = [];

        // ฟังก์ชันเปลี่ยนธีม (Verbose)
        function updateTheme(mode) {
            var body = document.body;
            var dBtn = document.getElementById('darkBtn');
            var lBtn = document.getElementById('lightBtn');

            if (mode === 'light') {
                body.setAttribute('data-theme', 'light');
                lBtn.classList.add('active');
                dBtn.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                dBtn.classList.add('active');
                lBtn.classList.remove('active');
            }
        }

        // ดึงข้อมูลจาก API
        async function fetchScripts(q) {
            var api = q ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(q) : "https://scriptblox.com/api/script/fetch?page=1&max=24";
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);

            try {
                var res = await fetch(proxy);
                var data = await res.json();
                scriptsArray = data.result.scripts || data.result.docs || [];
                renderGrid(scriptsArray);
            } catch (e) { console.error(e); }
        }

        function renderGrid(list) {
            var container = document.getElementById('scriptGrid');
            var html = "";

            for (var i = 0; i < list.length; i++) {
                var s = list[i];
                var img = s.image && s.image.startsWith('/') ? "https://scriptblox.com" + s.image : (s.game.imageUrl || "https://via.placeholder.com/400x225");

                html += '<div class="reth-card p-5" onclick="openModal(' + i + ')">';
                html += '  <div class="card-image-area rounded-2xl mb-5">';
                html += '    <img src="' + img + '">';
                html += '    <div class="tag-common ' + (s.key ? 'tag-key' : 'tag-keyless') + '">' + (s.key ? 'Key' : 'Keyless') + '</div>';
                html += '    <div class="tag-common status-badge">' + (s.isPatched ? 'Patched' : 'Working') + '</div>';
                html += '  </div>';
                html += '  <div class="flex-grow">';
                html += '    <div class="flex gap-3 text-[9px] font-black text-zinc-500 mb-2">';
                html += '      <span>👁 ' + (s.views || 0).toLocaleString() + '</span>';
                html += '      <span class="text-green-500">👍 ' + (s.likeCount || 0) + '</span>';
                html += '    </div>';
                html += '    <h3 class="font-black uppercase text-sm truncate tracking-tight">' + s.title + '</h3>';
                html += '    <p class="text-[9px] font-bold text-zinc-600 truncate">' + (s.game.name || "Universal") + '</p>';
                html += '  </div>';
                html += '  <div class="btn-copy" onclick="event.stopPropagation(); fastCopy(' + i + ', this)">Copy Loadstring</div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        // ฟังก์ชันเปิด Modal พร้อมข้อมูลครบ
        function openModal(idx) {
            var s = scriptsArray[idx];
            document.getElementById('m-title').innerText = s.title;
            document.getElementById('m-code').innerText = s.script || "-- No Source --";
            document.getElementById('m-web').href = "https://scriptblox.com/script/" + s.slug;
            document.getElementById('m-stats').innerHTML = "👁 " + (s.views || 0).toLocaleString() + " • 👍 " + (s.likeCount || 0) + " • 👎 " + (s.dislikeCount || 0);
            
            document.getElementById('detailModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function fastCopy(idx, btn) {
            navigator.clipboard.writeText(scriptsArray[idx].script);
            btn.innerText = "COPIED!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
            setTimeout(function() { btn.innerText = "Copy Loadstring"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 1500);
        }

        function copyFromModal() {
            var code = document.getElementById('m-code').innerText;
            navigator.clipboard.writeText(code);
            var btn = document.getElementById('m-copy');
            btn.innerText = "COPIED TO CLIPBOARD"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
            setTimeout(function() { btn.innerText = "Copy Script"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 2000);
        }

        var searchTimer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(function() { fetchScripts(e.target.value); }, 500);
        });

        window.onload = function() { fetchScripts(""); };
    </script>
</body>
</html>
