<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: rgba(5, 5, 5, 0.98);
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: rgba(255, 255, 255, 0.98);
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- Navigation & Buttons --- */
        .nav-container {
            position: fixed; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 12px; z-index: 1000;
        }

        .theme-switcher {
            display: flex; background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 4px; border-radius: 12px;
        }
        .t-btn {
            padding: 8px 14px; font-size: 9px; font-weight: 900;
            text-transform: uppercase; border-radius: 8px;
            cursor: pointer; color: var(--text-dim); transition: 0.2s;
        }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }

        .discord-link { 
            background: #5865F2; color: white;
            padding: 12px 20px; border-radius: 14px;
            font-size: 10px; font-weight: 900;
            text-transform: uppercase; text-decoration: none;
            display: flex; align-items: center; gap: 8px;
        }

        /* --- Header & Search --- */
        .hero-section {
            padding: 80px 20px 40px 20px; text-align: center;
        }
        .logo-text { font-size: 80px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; }
        .tagline { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5em; text-transform: uppercase; margin-top: 10px; }

        .search-area { width: 100%; max-width: 600px; margin: 40px auto 80px auto; }
        .reth-input { 
            width: 100%; background: var(--search-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 24px;
            color: var(--text-main); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em; outline: none;
        }

        /* --- Card Grid System --- */
        .grid-container {
            max-width: 1400px; margin: 0 auto; padding: 0 40px 100px 40px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;
        }
        .reth-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 26px; padding: 20px; display: flex; flex-direction: column;
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .reth-card:hover { transform: translateY(-8px); border-color: var(--text-dim); }

        .image-box {
            position: relative; aspect-ratio: 16/9; border-radius: 18px;
            overflow: hidden; background: #000; margin-bottom: 15px;
        }
        .image-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; transition: 0.5s; }
        .reth-card:hover img { opacity: 0.9; }
        
        .badge { position: absolute; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 10px; border-radius: 6px; z-index: 10; }
        .b-keyless { top: 12px; left: 12px; background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .b-key { top: 12px; left: 12px; background: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.3); }
        .b-status { top: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #222; }

        .copy-btn-fast {
            background: var(--text-main); color: var(--bg-color); text-align: center;
            padding: 14px; border-radius: 14px; font-size: 11px;
            font-weight: 900; text-transform: uppercase; margin-bottom: 15px;
        }

        /* --- Modal System --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-center; padding: 20px; }
        .modal-box { 
            background: var(--modal-bg); border: 1px solid var(--border-color); 
            border-radius: 32px; width: 100%; max-width: 700px; padding: 40px; 
            position: relative; backdrop-filter: blur(10px);
        }
        .code-display { 
            background: #000; border: 1px solid #111; border-radius: 16px; 
            padding: 20px; font-family: monospace; font-size: 11px; color: #666; 
            max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <div class="theme-switcher">
            <div id="darkBtn" class="t-btn active" onclick="switchTheme('dark')">Dark</div>
            <div id="lightBtn" class="t-btn" onclick="switchTheme('light')">Light</div>
        </div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-link">Discord</a>
    </div>

    <div class="hero-section">
        <h1 class="logo-text">RETH</h1>
        <p class="tagline">Official Script Hub</p>
        
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-input">
        </div>
    </div>

    <div id="scriptGrid" class="grid-container">
        </div>

    <div id="modalOverlay" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 hover:text-white uppercase">Close [X]</button>
            <h2 id="modalTitle" class="text-3xl font-black uppercase italic mb-2 tracking-tighter"></h2>
            <div id="modalStats" class="flex gap-4 text-[10px] font-bold text-zinc-500 mb-6 uppercase"></div>
            
            <div class="flex gap-4 mb-8">
                <button id="modalCopyBtn" onclick="copyFromModal()" class="flex-1 bg-white text-black py-4 rounded-xl font-black text-[11px] uppercase transition-all">Copy Script</button>
                <a id="modalWebBtn" href="#" target="_blank" class="px-8 border border-zinc-800 rounded-xl flex items-center text-[10px] font-black uppercase text-white hover:bg-zinc-900">View Web</a>
            </div>

            <p class="text-[9px] font-black text-zinc-600 uppercase mb-2">Script Output:</p>
            <div id="modalCode" class="code-display"></div>
        </div>
    </div>

    <script>
        var masterData = [];

        // 🌗 Theme Function (Standard Verbose)
        function switchTheme(mode) {
            var body = document.body;
            var d = document.getElementById('darkBtn');
            var l = document.getElementById('lightBtn');

            if (mode === 'light') {
                body.setAttribute('data-theme', 'light');
                l.classList.add('active'); d.classList.remove('active');
            } else {
                body.removeAttribute('data-theme');
                d.classList.add('active'); l.classList.remove('active');
            }
        }

        // 🌐 API Fetching
        async function loadScripts(query) {
            var api = query ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(query) + "&max=24" : "https://scriptblox.com/api/script/fetch?page=1&max=24";
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);

            try {
                var response = await fetch(proxy);
                var json = await response.json();
                masterData = json.result.scripts || json.result.docs || [];
                renderGrid(masterData);
            } catch (err) { console.error("Error loading scripts:", err); }
        }

        // 🎨 Rendering UI
        function renderGrid(list) {
            var container = document.getElementById('scriptGrid');
            var html = "";

            for (var i = 0; i < list.length; i++) {
                var s = list[i];
                var thumb = s.image && s.image.startsWith('/') ? "https://scriptblox.com" + s.image : (s.game.imageUrl || "https://via.placeholder.com/400x225/000/333?text=RETH+HUB");

                html += '<div class="reth-card" onclick="openDetail(' + i + ')">';
                html += '  <div class="image-box">';
                html += '    <img src="' + thumb + '">';
                html += '    <div class="badge ' + (s.key ? 'b-key' : 'b-keyless') + '">' + (s.key ? 'Key Required' : 'Keyless') + '</div>';
                html += '    <div class="badge b-status">' + (s.isPatched ? 'Patched' : 'Working') + '</div>';
                html += '  </div>';
                html += '  <div class="flex flex-col flex-grow">';
                html += '    <div class="flex gap-2 text-[9px] font-black text-zinc-500 mb-2 uppercase">👁 ' + (s.views || 0).toLocaleString() + ' • 👍 ' + (s.likeCount || 0) + '</div>';
                html += '    <div class="copy-btn-fast" onclick="event.stopPropagation(); fastCopy(' + i + ', this)">Copy Loadstring</div>';
                html += '    <h3 class="text-sm font-black uppercase truncate mb-1">' + s.title + '</h3>';
                html += '    <p class="text-[9px] font-bold text-zinc-600 truncate">' + (s.game.name || "Universal Script") + '</p>';
                html += '  </div>';
                html += '</div>';
            }
            container.innerHTML = html;
        }

        // 📦 Modal Actions
        function openDetail(index) {
            var data = masterData[index];
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalCode').innerText = data.script || "-- No Code Found --";
            document.getElementById('modalWebBtn').href = "https://scriptblox.com/script/" + data.slug;
            document.getElementById('modalStats').innerHTML = "Views: " + (data.views || 0).toLocaleString() + " • Likes: " + (data.likeCount || 0) + " • Dislikes: " + (data.dislikeCount || 0);
            
            var modal = document.getElementById('modalOverlay');
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function fastCopy(index, btn) {
            navigator.clipboard.writeText(masterData[index].script);
            var original = btn.innerText;
            btn.innerText = "COPIED!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
            setTimeout(function() { btn.innerText = original; btn.style.backgroundColor = ""; btn.style.color = ""; }, 1500);
        }

        function copyFromModal() {
            var code = document.getElementById('modalCode').innerText;
            navigator.clipboard.writeText(code);
            var btn = document.getElementById('modalCopyBtn');
            btn.innerText = "DONE!"; btn.style.backgroundColor = "#22c55e"; btn.style.color = "#fff";
            setTimeout(function() { btn.innerText = "Copy Script"; btn.style.backgroundColor = ""; btn.style.color = ""; }, 2000);
        }

        // 🔍 Search System
        var timer;
        document.getElementById('searchInput').addEventListener('input', function(e) {
            clearTimeout(timer);
            timer = setTimeout(function() { loadScripts(e.target.value); }, 600);
        });

        window.onload = function() { loadScripts(""); };
    </script>
</body>
</html>
