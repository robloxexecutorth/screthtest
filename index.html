<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — ULTIMATE 3D SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(8, 8, 8, 0.65);
            --text-main: #ffffff;
            --text-dim: #777777;
            --border-color: rgba(255, 255, 255, 0.1);
            --modal-bg: rgba(10, 10, 10, 0.98);
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --card-bg: rgba(245, 245, 245, 0.85);
            --text-main: #000000;
            --text-dim: #555555;
            --border-color: rgba(0, 0, 0, 0.1);
            --modal-bg: #ffffff;
        }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; scroll-behavior: smooth; }
        
        /* 3D Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* UI Elements */
        .reth-title { font-size: clamp(50px, 8vw, 100px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 0.9; letter-spacing: -0.04em; }
        
        .nav-sticky { position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(20px); background: rgba(0,0,0,0.2); padding: 15px 0; border-bottom: 1px solid var(--border-color); }

        .reth-search { 
            background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 20px; 
            color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; 
            width: 100%; padding: 18px 25px; transition: 0.3s;
        }
        .reth-search:focus { border-color: #1D9BF0; outline: none; box-shadow: 0 0 20px rgba(29, 155, 240, 0.2); }

        /* Card Animation */
        .reth-card { 
            background: var(--card-bg); border: 1.5px solid var(--border-color); border-radius: 28px; 
            transition: 0.4s; overflow: hidden; position: relative; backdrop-filter: blur(15px);
            animation: fadeIn 0.6s ease forwards;
        }
        .reth-card:hover { transform: translateY(-8px); border-color: var(--text-main); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Skeleton Loading */
        .skeleton { background: linear-gradient(90deg, var(--card-bg) 25%, var(--border-color) 50%, var(--card-bg) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* Badges */
        .ver-badge { position: absolute; top: 12px; left: 12px; width: 24px; height: 24px; z-index: 30; }
        .key-badge { position: absolute; top: 12px; left: 42px; border-radius: 8px; padding: 4px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); border-radius: 8px; padding: 4px 10px; font-size: 8px; font-weight: 900; color: white; display: flex; align-items: center; gap: 5px; }

        .btn-copy { background: #ffffff; color: #000; padding: 12px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.95); }

        /* Toast & Modal */
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 35px; border-radius: 50px; font-size: 11px; font-weight: 900; z-index: 9999; display: none; }
        #modal { backdrop-filter: blur(25px); transition: 0.3s ease; }
        pre { background: #000; padding: 20px; border-radius: 15px; font-size: 11px; color: #00ff00; overflow: auto; border: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="toast">COPIED SUCCESSFULLY!</div>

    <nav class="nav-sticky px-6 md:px-16">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-black text-xl italic">RETH</div>
            <div class="flex items-center gap-4">
                <button onclick="setTheme('dark')" id="dBtn" class="text-[10px] font-black uppercase opacity-50 hover:opacity-100 transition">Dark</button>
                <button onclick="setTheme('light')" id="lBtn" class="text-[10px] font-black uppercase opacity-50 hover:opacity-100 transition">Light</button>
                <a href="#" class="bg-[#5865F2] px-4 py-2 rounded-lg text-[9px] font-black uppercase">Discord</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pb-20">
        <header class="py-24 text-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.6em] mt-6">Premium Script Experience</p>
        </header>

        <div class="max-w-3xl mx-auto mb-16 relative">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS (EX: BLOX FRUITS)..." class="reth-search">
                <button onclick="document.getElementById('filterMenu').classList.toggle('hidden')" class="bg-[var(--card-bg)] px-6 rounded-2xl border-2 border-[var(--border-color)] text-[10px] font-black uppercase">Filter</button>
            </div>
            
            <div id="filterMenu" class="absolute top-full mt-4 right-0 w-64 bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-2xl p-6 hidden shadow-2xl z-50">
                <label class="flex justify-between items-center mb-4 cursor-pointer text-[10px] font-black uppercase">Verified Only <input type="checkbox" id="fVer" onchange="render()"></label>
                <label class="flex justify-between items-center cursor-pointer text-[10px] font-black uppercase">Keyless Only <input type="checkbox" id="fKey" onchange="render()"></label>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>

        <div id="errorState" class="hidden text-center py-20">
            <i class="fa-solid fa-triangle-exclamation text-4xl mb-4 opacity-20"></i>
            <h3 class="text-xl font-black uppercase">No Scripts Found</h3>
            <p class="text-zinc-500 text-sm mt-2">Try searching for something else or check your connection.</p>
            <button onclick="fetchScripts()" class="mt-6 text-[10px] font-black uppercase underline">Reset Search</button>
        </div>

        <div id="loadArea" class="flex justify-center mt-20 hidden">
            <button onclick="loadMore()" class="bg-white text-black px-12 py-5 rounded-full text-[11px] font-black uppercase hover:scale-105 transition">Load More Content</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-4 bg-black/90 opacity-0">
        <div class="bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-[35px] max-w-3xl w-full p-8 md:p-12 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-zinc-500 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            
            <h2 id="mTitle" class="text-3xl font-black italic uppercase mb-6 pr-10"></h2>
            <div id="mStats" class="flex gap-6 text-[10px] font-black text-zinc-500 uppercase mb-8 border-b border-zinc-800 pb-6"></div>
            
            <div class="grid md:grid-cols-2 gap-8">
                <div class="rounded-2xl overflow-hidden border-2 border-zinc-800 bg-black aspect-video">
                    <img id="mImg" src="" class="w-full h-full object-cover">
                </div>
                <div>
                    <button onclick="copyFromModal()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[12px] uppercase mb-4 hover:bg-zinc-200 transition">Copy Script</button>
                    <a id="mLink" href="#" target="_blank" class="w-full border-2 border-zinc-800 py-4 rounded-xl font-black text-[12px] uppercase flex justify-center hover:bg-white/5 transition">Source Page</a>
                </div>
            </div>
            
            <div class="mt-8">
                <p class="text-[10px] font-black uppercase text-zinc-500 mb-3">Script Preview:</p>
                <pre id="mCode"></pre>
            </div>
        </div>
    </div>

    <script>
        // --- 1000% 3D ENGINE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
        const shapes = [];

        function init3D() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = 35;
            const geoPool = [new THREE.IcosahedronGeometry(2,0), new THREE.BoxGeometry(3,3,3), new THREE.OctahedronGeometry(2.5)];
            
            for(let i=0; i<50; i++) {
                const mat = new THREE.MeshPhongMaterial({ color: 0x4f6b8f, wireframe: true, transparent: true, opacity: 0.1, shininess: 100 });
                const mesh = new THREE.Mesh(geoPool[Math.floor(Math.random()*3)], mat);
                mesh.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*80, (Math.random()-0.5)*50);
                mesh.userData = { speedY: 0.03 + Math.random()*0.07, rot: Math.random()*0.01 };
                scene.add(mesh);
                shapes.push(mesh);
            }
            
            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 0, 20);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(s => {
                s.position.y += s.userData.speedY;
                s.rotation.x += s.userData.rot;
                if(s.position.y > 45) s.position.y = -45;
            });
            renderer.render(scene, camera);
        }

        // --- SCRIPTBLOX 1000% CORE ---
        let scripts = []; let page = 1; let query = "";
        const blueStar = `<svg viewBox="0 0 24 24" class="w-full h-full"><path d="M12 1L14.39 3.46L17.77 2.82L18.89 6.04L22.14 7.02L21.31 10.33L23 13.17L20.61 15.63L21.25 19.01L18.03 20.13L17.05 23.38L13.74 22.55L10.9 24.24L8.44 21.85L5.06 22.49L3.94 19.27L0.69 18.29L1.52 14.98L-0.17 12.14L2.22 9.68L1.58 6.3L4.8 5.18L5.78 1.93L9.09 2.76L11.93 1.07Z" fill="#1D9BF0"/><path d="M9.5 15.5l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4-7 7z" fill="white"/></svg>`;

        async function fetchScripts(q = "", p = 1, append = false) {
            query = q; page = p;
            if(!append) showSkeletons();
            
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=20&page=${p}` : `https://scriptblox.com/api/script/fetch?page=${p}&max=20`;
            
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(api)}`);
                const data = await res.json();
                const newScripts = data.result.scripts || data.result.docs || [];
                
                scripts = append ? [...scripts, ...newScripts] : newScripts;
                document.getElementById('loadArea').classList.toggle('hidden', page >= data.result.totalPages);
                render();
            } catch (err) {
                console.error(err);
                document.getElementById('scriptGrid').innerHTML = "";
                document.getElementById('errorState').classList.remove('hidden');
            }
        }

        function showSkeletons() {
            const grid = document.getElementById('scriptGrid');
            grid.innerHTML = Array(8).fill(0).map(() => `
                <div class="reth-card p-6 opacity-50">
                    <div class="aspect-video rounded-2xl skeleton mb-5"></div>
                    <div class="h-10 rounded-xl skeleton mb-4"></div>
                    <div class="h-4 w-2/3 rounded skeleton"></div>
                </div>
            `).join('');
            document.getElementById('errorState').classList.add('hidden');
        }

        function render() {
            const grid = document.getElementById('scriptGrid');
            const fV = document.getElementById('fVer').checked;
            const fK = document.getElementById('fKey').checked;
            const filtered = scripts.filter(s => (!fV || s.verified) && (!fK || s.key === false));

            if(filtered.length === 0) {
                grid.innerHTML = "";
                document.getElementById('errorState').classList.remove('hidden');
                return;
            }

            grid.innerHTML = filtered.map((s, i) => {
                const img = s.image && s.image.startsWith('http') ? s.image : (s.game.imageUrl ? s.game.imageUrl : "https://via.placeholder.com/400x225");
                return `
                <div class="reth-card p-6" onclick="openModal(${i})">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900 border border-[var(--border-color)]">
                        ${s.verified ? `<div class="ver-badge">${blueStar}</div>` : ""}
                        <div class="key-badge ${s.key ? 'bg-red-500 text-white' : 'bg-yellow-500 text-black'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <div class="status-badge"><span class="dot"></span> Working</div>
                        <img src="${img}" class="w-full h-full object-cover opacity-60 hover:opacity-100 transition duration-500">
                    </div>
                    <button class="btn-copy mb-4" onclick="event.stopPropagation(); quickCopy(${i})">Copy Script</button>
                    <div class="flex gap-3 text-[9px] font-black text-zinc-500 uppercase mb-2">
                        <span><i class="fa-solid fa-eye"></i> ${s.views.toLocaleString()}</span>
                        <span>👍 ${s.likeCount || 0}</span>
                    </div>
                    <h3 class="text-xs font-black uppercase truncate">${s.title}</h3>
                    <p class="text-[8px] font-bold text-zinc-600 truncate mt-1">${s.game.name}</p>
                </div>`;
            }).join('');
        }

        // --- UTILS ---
        function quickCopy(i) { navigator.clipboard.writeText(scripts[i].script); showToast(); }
        function showToast() { 
            const t = document.getElementById('toast'); 
            t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 2500); 
        }

        function setTheme(m) {
            document.documentElement.setAttribute('data-theme', m);
            document.getElementById('dBtn').style.opacity = (m === 'dark' ? '1' : '0.4');
            document.getElementById('lBtn').style.opacity = (m === 'light' ? '1' : '0.4');
            shapes.forEach(s => s.material.color.set(m === 'light' ? 0x222222 : 0x4f6b8f));
        }

        function openModal(i) {
            const s = scripts[i];
            document.getElementById('mTitle').innerText = s.title;
            document.getElementById('mImg').src = s.game.imageUrl || "";
            document.getElementById('mStats').innerHTML = `<span>Views: ${s.views}</span><span>Likes: ${s.likeCount}</span><span>Game: ${s.game.name}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- NO CODE --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            
            const modal = document.getElementById('modal');
            modal.classList.replace('hidden', 'flex');
            setTimeout(() => modal.classList.add('opacity-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-100');
            setTimeout(() => modal.classList.replace('flex', 'hidden'), 300);
        }

        function loadMore() { fetchScripts(query, page + 1, true); }

        // --- EVENTS ---
        let timeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => fetchScripts(e.target.value), 600);
        });

        window.onload = () => { init3D(); animate3D(); fetchScripts(); setTheme('dark'); };
        window.onresize = () => {
            camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
