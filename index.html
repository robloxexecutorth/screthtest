<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — KEYLESS & VERIFIED ON COVER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            transition: background-color 0.3s;
        }

        /* --- Search & Filter Row --- */
        .search-container {
            display: flex;
            gap: 12px;
            max-width: 650px;
            margin: 0 auto 60px auto;
            position: relative;
        }

        .reth-search { 
            background: var(--search-bg); 
            border: 1px solid var(--border-color); 
            border-radius: 20px; 
            color: var(--text-main); 
            font-size: 14px; 
            font-weight: 700; 
            text-transform: uppercase; 
            flex: 1; 
            padding: 22px 28px; 
            outline: none;
            transition: 0.3s;
        }
        .reth-search:focus { border-color: var(--accent); }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0 25px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); }

        /* --- Floating Filter Menu --- */
        .float-filter-menu {
            position: absolute;
            top: calc(100% + 15px);
            right: 0;
            width: 280px;
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .float-filter-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }

        .filter-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .filter-option span { font-size: 11px; font-weight: 800; text-transform: uppercase; }

        .custom-check input { display: none; }
        .box { width: 18px; height: 18px; border: 2px solid var(--border-color); border-radius: 6px; position: relative; transition: 0.2s; }
        .custom-check input:checked + .box { background: var(--accent); border-color: var(--accent); }
        .custom-check input:checked + .box::after { content: '✓'; position: absolute; color: white; font-size: 10px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        /* --- Card Styles & Badges --- */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; transition: 0.3s; overflow: hidden; position: relative; cursor: pointer; }
        .reth-card:hover { transform: translateY(-5px); border-color: var(--text-dim); }
        .reth-card img { opacity: 0.5; transition: 0.5s; }
        
        /* Status Badge (Right Side) */
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 5px 10px; font-size: 9px; font-weight: 900; z-index: 10; display: flex; align-items: center; gap: 6px; }
        
        /* Verified Badge (Left Side) */
        .ver-badge-cover { position: absolute; top: 12px; left: 12px; background: #3b82f6; color: white; border-radius: 8px; padding: 5px; z-index: 20; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Keyless Badge (Next to Verified) */
        .keyless-badge-cover { position: absolute; top: 12px; left: 45px; background: #eab308; color: black; border-radius: 8px; padding: 4px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Adjust Keyless if NO verified badge */
        .no-ver .keyless-badge-cover { left: 12px; }

        .dot { height: 6px; width: 6px; border-radius: 50%; }
        .dot.working { background: #22c55e; }
        .dot.patched { background: #ef4444; }

        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
        .btn-copy { background: var(--text-main); color: var(--bg-color); text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; }

        /* --- Header & Nav --- */
        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        .nav-controls { position: fixed; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <div onclick="setTheme('dark')" id="dBtn" class="t-btn active">Dark</div>
        <div onclick="setTheme('light')" id="lBtn" class="t-btn">Light</div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="bg-[#5865F2] text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase flex items-center gap-2 hover:scale-105 transition-transform">Discord</a>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <div class="h-[2px] w-24 bg-zinc-800 -mt-2"></div>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" id="filterBtn" class="filter-btn">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5v-2z"/></svg>
                Filter
            </button>

            <div id="filterMenu" class="float-filter-menu">
                <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-3">Quick Filters</h3>
                <label class="filter-option custom-check"><span>Universal</span><input type="checkbox" onchange="updateFilter('universal', this.checked)"><div class="box"></div></label>
                <label class="filter-option custom-check"><span>Verified</span><input type="checkbox" onchange="updateFilter('verified', this.checked)"><div class="box"></div></label>
                <label class="filter-option custom-check"><span>Keyless</span><input type="checkbox" onchange="updateFilter('keyless', this.checked)"><div class="box"></div></label>
                <label class="filter-option custom-check"><span>Hide Patched</span><input type="checkbox" onchange="updateFilter('working', this.checked)"><div class="box"></div></label>
                <button onclick="resetFilters()" class="w-full mt-4 py-3 border border-zinc-800 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition">Reset Filters</button>
            </div>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6 transition-opacity duration-300 opacity-0">
        <div class="bg-[var(--modal-bg)] border border-[var(--border-color)] rounded-[35px] max-w-2xl w-full p-10 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-2"></h2>
            <div id="mStats" class="stats-row mb-6"></div>
            <div class="flex gap-4 mb-8">
                <button id="mCopy" onclick="copyFromModal()" class="btn-copy flex-1 mb-0">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border border-zinc-800 rounded-xl flex items-center justify-center text-[11px] font-black uppercase">Source</a>
            </div>
            <div id="mCode" class="bg-black border border-zinc-900 p-6 rounded-2xl font-mono text-xs text-zinc-500 max-h-[250px] overflow-auto whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        let scripts = [];
        let filters = { universal: false, verified: false, keyless: false, working: false };

        const verSVG = `<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.067.87a2.89 2.89 0 0 0-4.134 0l-.622.638-.89-.011a2.89 2.89 0 0 0-2.924 2.924l.01.89-.636.622a2.89 2.89 0 0 0 0 4.134l.637.622-.011.89a2.89 2.89 0 0 0 2.924 2.924l.89-.01.622.636a2.89 2.89 0 0 0 4.134 0l.622-.637.89.011a2.89 2.89 0 0 0 2.924-2.924l-.01-.89.636-.622a2.89 2.89 0 0 0 0-4.134l-.637-.622.011-.89a2.89 2.89 0 0 0-2.924-2.924l-.89.01-.622-.636zm.287 5.984-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7 8.793l2.646-2.647a.5.5 0 0 1 .708.708z"/></svg>`;

        function toggleFilter() {
            const menu = document.getElementById('filterMenu');
            const btn = document.getElementById('filterBtn');
            menu.classList.toggle('show');
            btn.classList.toggle('active');
        }

        window.addEventListener('click', (e) => {
            if (!document.querySelector('.search-container').contains(e.target)) {
                document.getElementById('filterMenu').classList.remove('show');
                document.getElementById('filterBtn').classList.remove('active');
            }
        });

        function updateFilter(k, v) { filters[k] = v; apply(); }
        function resetFilters() { 
            filters = { universal: false, verified: false, keyless: false, working: false };
            document.querySelectorAll('#filterMenu input').forEach(i => i.checked = false);
            apply(); 
        }

        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').className = m === 'dark' ? 't-btn active' : 't-btn';
            document.getElementById('lBtn').className = m === 'light' ? 't-btn active' : 't-btn';
        }

        async function load(q = "") {
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=50` : "https://scriptblox.com/api/script/fetch?page=1&max=50";
            try {
                const res = await fetch("https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api));
                const data = await res.json();
                scripts = data.result.scripts || data.result.docs || [];
                apply();
            } catch (e) { console.error("API Error"); }
        }

        function apply() {
            const f = scripts.filter(s => {
                if (filters.universal && !s.isUniversal) return false;
                if (filters.verified && !s.verified) return false;
                // LOGIC: Keyless filter only shows scripts where key is false
                if (filters.keyless && s.key !== false) return false;
                if (filters.working && s.isPatched) return false;
                return true;
            });
            render(f);
        }

        function render(list) {
            let html = "";
            list.forEach((s) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                const vBadge = s.verified ? `<div class="ver-badge-cover">${verSVG}</div>` : "";
                
                // LOGIC: Show Badge if Keyless (s.key is false)
                const isKeyless = s.key === false;
                const kBadge = isKeyless ? `<div class="keyless-badge-cover">Keyless</div>` : "";
                
                html += `
                <div class="reth-card p-6 ${!s.verified ? 'no-ver' : ''}" onclick="openModal(${scripts.indexOf(s)})">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900">
                        ${vBadge}
                        ${kBadge}
                        <div class="status-badge"><span class="dot ${s.isPatched ? 'patched' : 'working'}"></span> ${s.isPatched ? 'Patched' : 'Working'}</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="stats-row">
                        <span>👁 ${s.views.toLocaleString()}</span>
                        <span class="text-green-500">👍 ${s.likeCount}</span>
                        <span class="text-red-500">👎 ${s.dislikeCount}</span>
                    </div>
                    <div class="btn-copy" onclick="event.stopPropagation(); quickCopy(${scripts.indexOf(s)}, this)">Copy Loadstring</div>
                    <h3 class="text-sm font-black uppercase truncate">${s.title}</h3>
                    <p class="text-[9px] font-bold text-zinc-500 uppercase mt-1 truncate">${s.game.name}</p>
                </div>`;
            });
            document.getElementById('scriptGrid').innerHTML = html || '<p class="col-span-full text-center py-20 font-black opacity-20">NO RESULTS FOUND</p>';
        }

        function openModal(idx) {
            const s = scripts[idx];
            document.getElementById('mTitle').innerHTML = `${s.title} ${s.verified ? '<span class="text-blue-500 ml-2 inline-block">'+verSVG+'</span>' : ""}`;
            document.getElementById('mStats').innerHTML = `<span>Views: ${s.views.toLocaleString()}</span> <span class="text-green-500">Likes: ${s.likeCount}</span> <span class="text-red-500">Dislikes: ${s.dislikeCount}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- NO SCRIPT DATA --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            
            const m = document.getElementById('modal');
            m.classList.replace('hidden', 'flex');
            setTimeout(() => m.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100');
            setTimeout(() => { m.classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function quickCopy(idx, btn) {
            navigator.clipboard.writeText(scripts[idx].script).then(() => {
                const old = btn.innerText; btn.innerText = "COPIED!"; btn.style.background = "#22c55e";
                setTimeout(() => { btn.innerText = old; btn.style.background = ""; }, 1500);
            });
        }

        function copyFromModal() {
            navigator.clipboard.writeText(document.getElementById('mCode').innerText).then(() => {
                const btn = document.getElementById('mCopy'); btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Script", 1500);
            });
        }

        let debounce;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(debounce);
            debounce = setTimeout(() => load(e.target.value), 500);
        });

        window.onload = () => load("");
    </script>
</body>
</html>
