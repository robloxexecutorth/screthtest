<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — SCRIPT HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --border-color: #111111;
            --search-bg: #050505;
            --modal-bg: #080808;
            --accent: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-dim: #a1a1aa;
            --border-color: #e4e4e7;
            --search-bg: #ffffff;
            --modal-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0px; 
            -webkit-font-smoothing: antialiased; 
            transition: background-color 0.3s;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100%;
            background: var(--modal-bg); border-left: 1px solid var(--border-color);
            z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { right: 0; }
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 999; display: none; backdrop-filter: blur(4px);
        }
        .sidebar-overlay.active { display: block; }

        .filter-group { margin-bottom: 25px; }
        .filter-label { 
            font-size: 10px; font-weight: 900; color: var(--text-dim); 
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; display: block;
        }
        
        .custom-checkbox {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; cursor: pointer; border-bottom: 1px solid var(--border-color);
        }
        .custom-checkbox span { font-size: 13px; font-weight: 600; }
        .checkbox-box {
            width: 20px; height: 20px; border: 2px solid var(--border-color);
            border-radius: 6px; transition: 0.2s; position: relative;
        }
        .custom-checkbox input:checked + .checkbox-box {
            background: var(--accent); border-color: var(--accent);
        }

        /* --- Utility Buttons --- */
        .btn-filter-trigger {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 12px 20px; border-radius: 12px; font-size: 12px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        .nav-controls {
            position: fixed; top: 25px; right: 25px;
            display: flex; align-items: center; gap: 12px; z-index: 100;
        }

        /* --- Reuse Existing Styles --- */
        .reth-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; transition: 0.3s; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; cursor: pointer; }
        .reth-card:hover { border-color: var(--text-dim); transform: translateY(-5px); }
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 5px 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(8px); z-index: 20; color: #ffffff; }
        .status-dot.working { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-dot.patched { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .key-tag { position: absolute; top: 12px; left: 12px; font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 5px 10px; border-radius: 8px; z-index: 20; }
        .key-required { background-color: rgba(234, 179, 8, 0.2); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.4); }
        .keyless { background-color: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; }
        .stat-like { color: #4ade80; } .stat-dislike { color: #f87171; }
        .btn-copy-main { background-color: var(--text-main); color: var(--bg-color); text-align: center; padding: 14px 0; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .reth-search { background: var(--search-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; width: 100%; padding: 26px; outline: none; }
        .modal-content { background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 30px; max-width: 650px; width: 95%; padding: 40px; color: var(--text-main); }
        .script-box { background: #000000; border: 1px solid #111111; border-radius: 16px; padding: 20px; font-family: monospace; font-size: 12px; color: #777777; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body class="p-6 md:p-16">

    <div class="nav-controls">
        <button onclick="toggleSidebar()" class="btn-filter-trigger">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5v-2z"/></svg>
            Filters
        </button>
        <div class="theme-toggle">
            <div id="darkBtn" class="t-btn active" onclick="setTheme('dark')">Dark</div>
            <div id="lightBtn" class="t-btn" onclick="setTheme('light')">Light</div>
        </div>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn">Join Discord</a>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside id="filterSidebar" class="sidebar">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-black uppercase italic italic">Advanced Search</h2>
            <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-white font-bold text-[10px]">CLOSE [X]</button>
        </div>

        <div class="filter-group">
            <label class="filter-label">Status & Verification</label>
            <label class="custom-checkbox">
                <span>Verified Only</span>
                <input type="checkbox" class="hidden" onchange="updateFilter('verified', this.checked)">
                <div class="checkbox-box"></div>
            </label>
            <label class="custom-checkbox">
                <span>Universal Scripts</span>
                <input type="checkbox" class="hidden" onchange="updateFilter('universal', this.checked)">
                <div class="checkbox-box"></div>
            </label>
            <label class="custom-checkbox">
                <span>Keyless (No Key)</span>
                <input type="checkbox" class="hidden" onchange="updateFilter('keyless', this.checked)">
                <div class="checkbox-box"></div>
            </label>
            <label class="custom-checkbox">
                <span>Working Only</span>
                <input type="checkbox" class="hidden" onchange="updateFilter('working', this.checked)">
                <div class="checkbox-box"></div>
            </label>
        </div>

        <button onclick="resetFilters()" class="w-full py-4 border border-zinc-800 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-black transition">Reset All Filters</button>
    </aside>

    <div class="max-w-7xl mx-auto">
        <header class="py-16 md:py-24 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <div class="reth-title-underline"></div>
            <p class="reth-subtitle">OFFICIAL SCRIPT HUB</p>
        </header>

        <div class="max-w-[600px] mx-auto mb-20">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </div>

    <div id="scriptModal" class="fixed inset-0 bg-black/95 z-[1100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="modal-content relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-zinc-600 hover:text-white font-bold uppercase text-[10px] tracking-widest">Close [X]</button>
            <h2 id="modalTitle" class="text-2xl font-black uppercase italic mb-2 tracking-tighter flex items-center gap-1"></h2>
            <div id="modalStats" class="stats-row mb-3"></div>
            <p id="modalGame" class="text-[11px] text-zinc-500 font-bold uppercase tracking-widest mb-10"></p>
            <div class="flex gap-4 mb-8">
                <div onclick="copyFromModal()" id="modalCopyBtn" class="btn-copy-main flex-1 mb-0">COPY SCRIPT</div>
                <a href="#" id="modalWebLink" target="_blank" class="modal-btn-web">VIEW WEB</a>
            </div>
            <div id="modalScript" class="script-box"></div>
        </div>
    </div>

    <script>
        var scriptGridElement = document.getElementById('scriptGrid');
        var modalElement = document.getElementById('scriptModal');
        var sidebarElement = document.getElementById('filterSidebar');
        var overlayElement = document.getElementById('sidebarOverlay');
        var scriptsArrayData = [];
        
        var activeFilters = {
            universal: false,
            verified: false,
            keyless: false,
            working: false
        };

        function toggleSidebar() {
            sidebarElement.classList.toggle('active');
            overlayElement.classList.toggle('active');
        }

        function updateFilter(type, value) {
            activeFilters[type] = value;
            applyFilters();
        }

        function resetFilters() {
            activeFilters = { universal: false, verified: false, keyless: false, working: false };
            document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(el => el.checked = false);
            applyFilters();
        }

        async function fetchScriptsFromServer(searchQuery) {
            var api = searchQuery ? "https://scriptblox.com/api/script/search?q=" + encodeURIComponent(searchQuery) + "&max=50" : "https://scriptblox.com/api/script/fetch?page=1&max=50";
            var proxy = "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(api);
            try {
                var response = await fetch(proxy);
                var jsonData = await response.json();
                if (jsonData && jsonData.result) {
                    scriptsArrayData = jsonData.result.scripts || jsonData.result.docs || [];
                    applyFilters(); 
                }
            } catch (error) { console.error("Error:", error); }
        }

        function applyFilters() {
            var filteredList = scriptsArrayData.filter(item => {
                var passUniversal = activeFilters.universal ? item.isUniversal === true : true;
                var passVerified = activeFilters.verified ? item.verified === true : true;
                var passKeyless = activeFilters.keyless ? item.key === false : true;
                var passWorking = activeFilters.working ? item.isPatched === false : true;
                return passUniversal && passVerified && passKeyless && passWorking;
            });
            renderScriptsToUI(filteredList);
        }

        function renderScriptsToUI(list) {
            var html = "";
            list.forEach((item, i) => {
                var thumb = item.image && !item.image.includes('http') ? "https://scriptblox.com" + item.image : (item.game && item.game.imageUrl ? item.game.imageUrl : "https://via.placeholder.com/400x225/050505/222222?text=RETH+HUB");
                var statusHtml = item.isPatched ? '<span class="status-dot patched"></span> Patched' : '<span class="status-dot working"></span> Working';
                html += `
                <div class="reth-card p-6 group" onclick="openScriptDetailModal(${scriptsArrayData.indexOf(item)})">
                    <div class="relative aspect-video bg-black rounded-2xl mb-5 overflow-hidden">
                        <div class="key-tag ${item.key ? 'key-required' : 'keyless'}">${item.key ? 'Key Required' : 'Keyless'}</div>
                        <div class="status-badge">${statusHtml}</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="stats-row">
                        <span>👁 ${(item.views || 0).toLocaleString()}</span>
                        <span class="stat-like">👍 ${(item.likeCount || 0).toLocaleString()}</span>
                        <span class="stat-dislike">👎 ${(item.dislikeCount || 0).toLocaleString()}</span>
                    </div>
                    <div class="btn-copy-main" onclick="event.stopPropagation(); copyFromCard(${scriptsArrayData.indexOf(item)}, this)">COPY LOADSTRING</div>
                    <h3 class="text-sm font-black uppercase mb-1 truncate">${item.title}</h3>
                    <p class="text-[9px] text-zinc-600 font-bold uppercase truncate">${item.game ? item.game.name : "Universal"}</p>
                </div>`;
            });
            scriptGridElement.innerHTML = html || '<p class="text-center col-span-full py-20 uppercase font-black text-zinc-700">No scripts found.</p>';
        }

        // Logic Modal & Theme (เหมือนเดิมตามโค้ดฐาน)
        function openScriptDetailModal(index) {
            var s = scriptsArrayData[index];
            document.getElementById('modalTitle').innerText = s.title;
            document.getElementById('modalGame').innerText = s.game ? s.game.name : 'Universal';
            document.getElementById('modalStats').innerHTML = `<span>👁 ${s.views}</span><span class="stat-like">👍 ${s.likeCount}</span><span class="stat-dislike">👎 ${s.dislikeCount}</span>`;
            document.getElementById('modalScript').innerText = s.script || "-- No Script --";
            document.getElementById('modalWebLink').href = "https://scriptblox.com/script/" + s.slug;
            modalElement.classList.remove('hidden');
            setTimeout(() => modalElement.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalElement.classList.remove('opacity-100');
            setTimeout(() => { modalElement.classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        function setTheme(mode) {
            if (mode === 'light') document.body.setAttribute('data-theme', 'light');
            else document.body.removeAttribute('data-theme');
            document.querySelectorAll('.t-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.toLowerCase() === mode));
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(() => fetchScriptsFromServer(e.target.value), 500);
        });

        window.onload = () => fetchScriptsFromServer("");
    </script>
</body>
</html>
