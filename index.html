<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RETH OFFICIAL — THE ULTIMATE 3D HUB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(5, 5, 5, 0.6);
            --text-main: #ffffff;
            --text-dim: #666666;
            --border-color: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(10, 10, 10, 0.95);
            --code-bg: #000000;
            --code-text: #ffffff;
            --discord-color: #5865F2;
        }

        [data-theme="light"] {
            --bg-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #000000;
            --text-dim: #555555;
            --border-color: #000000;
            --modal-bg: #ffffff;
            --code-bg: #ffffff;
            --code-text: #000000;
        }

        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; position: relative; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .reth-title { font-size: clamp(60px, 10vw, 85px); font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; letter-spacing: -0.05em; }
        
        .nav-controls { position: absolute; top: 25px; right: 25px; display: flex; gap: 10px; z-index: 1100; }
        .t-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 10px; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); transition: 0.2s; backdrop-filter: blur(10px); }
        .t-btn.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        .discord-btn {
            background: var(--discord-color); color: white; padding: 10px 20px; border-radius: 12px;
            font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center;
            transition: 0.3s; box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); animation: discordGlow 2s infinite;
        }
        @keyframes discordGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(88, 101, 242, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px rgba(88, 101, 242, 0.8); transform: scale(1.02); }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--card-bg) 25%, rgba(255,255,255,0.05) 50%, var(--card-bg) 75%);
            background-size: 200% 100%; animation: skeletonShimmer 1.5s infinite linear; border-radius: 12px;
        }
        @keyframes skeletonShimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* Search & Categories */
        .search-container { display: flex; gap: 12px; max-width: 650px; margin: 0 auto 20px auto; position: relative; width: 100%; z-index: 10; }
        .reth-search { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; color: var(--text-main); font-size: 14px; font-weight: 700; text-transform: uppercase; flex: 1; padding: 22px 28px; backdrop-filter: blur(15px); }
        
        .category-container { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; max-width: 850px; margin: 0 auto 60px auto; position: relative; z-index: 10; align-items: center; }
        .chip { background: var(--card-bg); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 50px; font-size: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: var(--text-dim); transition: 0.2s; backdrop-filter: blur(10px); }
        .chip:hover, .chip.active { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }

        /* Category Plus Button */
        .chip-plus { background: var(--text-main); color: var(--bg-color); border: none; padding: 8px 12px; border-radius: 50px; font-size: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .chip-plus:hover { transform: scale(1.1) rotate(90deg); }

        /* Card System */
        .reth-card { 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 28px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); overflow: hidden; 
            position: relative; cursor: pointer; backdrop-filter: blur(12px);
        }
        .card-pop { animation: cardEntrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) backwards; }
        @keyframes cardEntrance { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .reth-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--text-main); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .reth-card img { opacity: 0.6; transition: 0.4s; }
        .reth-card:hover img { opacity: 1; }

        /* Badges */
        .ver-badge { position: absolute; top: 12px; left: 12px; width: 26px; height: 26px; z-index: 30; }
        .status-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 10; display: flex; align-items: center; gap: 6px; color: white; }
        .dot { height: 6px; width: 6px; border-radius: 50%; background: #22c55e; }
        .key-badge { position: absolute; top: 12px; left: 45px; border-radius: 8px; padding: 5px 10px; font-size: 8px; font-weight: 900; z-index: 15; text-transform: uppercase; }
        .bg-key { background: #ef4444; color: white; }
        .bg-keyless { background: #eab308; color: black; }
        
        .btn-copy-white { background: #ffffff; color: #000000; border: 1.5px solid var(--border-color); text-align: center; padding: 14px; border-radius: 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 15px; width: 100%; display: block; transition: 0.2s; }
        .stats-row { display: flex; gap: 12px; font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }

        /* Trending List UI */
        .trending-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .trending-name-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); padding: 15px; border-radius: 15px; text-align: center; font-size: 9px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .trending-name-btn:hover { background: var(--text-main); color: var(--bg-color); }

        /* Modal Settings */
        #modal, #trendingModal { backdrop-filter: blur(25px); position: fixed; inset: 0; }
        #modalImgArea { border: 2px solid var(--border-color); border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; background: #000; margin-bottom: 25px; }
        #mCode { background: var(--code-bg); color: var(--code-text); border: 2px solid var(--border-color); padding: 20px; border-radius: 18px; font-family: monospace; font-size: 10px; max-height: 180px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 12px 30px; border-radius: 50px; font-size: 11px; font-weight: 900; text-transform: uppercase; z-index: 3000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        .btn-load-more { background: transparent; border: 2px solid var(--border-color); color: var(--text-main); padding: 18px 50px; border-radius: 20px; font-size: 11px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.4s; letter-spacing: 0.15em; backdrop-filter: blur(10px); }
        .btn-load-more:hover { background: var(--text-main); color: var(--bg-color); }

        .reth-footer { margin-top: 40px; padding: 40px 0; border-top: 1px solid var(--border-color); text-align: center; }
        .credit-link { color: var(--text-main); font-weight: 900; text-decoration: none; font-style: italic; }
    </style>
</head>
<body class="p-6 md:p-16">

    <canvas id="bg-canvas"></canvas>
    <div id="toast">Copied to Clipboard!</div>

    <div class="nav-controls">
        <button onclick="setTheme('dark')" id="dBtn" class="t-btn">Dark</button>
        <button onclick="setTheme('light')" id="lBtn" class="t-btn">Light</button>
        <a href="https://discord.gg/Yp2bXVvU9B" target="_blank" class="discord-btn"><i class="fa-brands fa-discord mr-2"></i> Discord</a>
    </div>

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="py-20 text-center flex flex-col items-center">
            <h1 class="reth-title">RETH</h1>
            <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.5em] mt-5">Official Script Hub</p>
        </header>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH FOR SCRIPTS..." class="reth-search">
            <button onclick="toggleFilter()" class="t-btn !px-8 !py-0 !rounded-2xl">Filter</button>
            <div id="filterMenu" class="absolute top-full mt-4 right-0 w-64 bg-[var(--modal-bg)] border border-[var(--border-color)] rounded-2xl p-6 hidden z-50 shadow-2xl">
                <h3 class="text-[9px] font-black text-zinc-500 uppercase tracking-widest mb-4">Quick Filters</h3>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Verified Only</span><input type="checkbox" id="fVer" onchange="render()"></label>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Keyless Only</span><input type="checkbox" id="fKey" onchange="render()"></label>
                <label class="flex justify-between py-2 cursor-pointer text-[11px] font-bold uppercase"><span>Universal Only</span><input type="checkbox" id="fUni" onchange="render()"></label>
            </div>
        </div>

        <div class="category-container">
            <button class="chip active" onclick="filterByCategory('', this)">All Games</button>
            <button class="chip" onclick="filterByCategory('Blox Fruits', this)">Blox Fruits</button>
            <button class="chip" onclick="filterByCategory('Pet Simulator 99', this)">Pet Sim 99</button>
            <button class="chip" onclick="filterByCategory('Brookhaven', this)">Brookhaven</button>
            <button class="chip" onclick="filterByCategory('Murder Mystery 2', this)">MM2</button>
            <button class="chip-plus" onclick="openTrending()"><i class="fa-solid fa-plus"></i></button>
        </div>

        <div id="scriptGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        
        <div class="flex justify-center py-24" id="loadMoreArea" style="display: none;">
            <button onclick="loadMore()" class="btn-load-more">Load More Scripts</button>
        </div>

        <footer class="reth-footer">
            <div class="flex flex-col items-center gap-3">
                <p class="text-[10px] font-black uppercase text-zinc-500 tracking-[0.4em]">Powered By</p>
                <a href="https://scriptblox.com" target="_blank" class="credit-link text-xl tracking-tighter">SCRIPT<span class="text-zinc-500">BLOX</span></a>
                <p class="text-[9px] font-bold text-zinc-600 uppercase mt-4 tracking-widest">© 2026 RETH OFFICIAL — Crafted for Excellence</p>
            </div>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6 bg-black/80 opacity-0 transition-opacity duration-300">
        <div class="bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-[40px] max-w-2xl w-full p-10 relative">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 id="mTitle" class="text-2xl font-black italic uppercase mb-2"></h2>
            <div id="mStatsRow" class="stats-row mb-6"></div>
            <div id="modalImgArea"><img id="mImg" src="" class="w-full h-full object-cover"></div>
            <div class="flex gap-4 mb-8">
                <button onclick="copyFromModal()" class="bg-white text-black border-2 border-[var(--border-color)] flex-1 py-4 rounded-xl font-black text-[11px] uppercase transition hover:bg-zinc-200">Copy Script</button>
                <a id="mLink" href="#" target="_blank" class="flex-1 border-2 border-[var(--border-color)] rounded-xl flex items-center justify-center text-[11px] font-black uppercase text-[var(--text-main)]">Source Link</a>
            </div>
            <div id="mCode"></div>
        </div>
    </div>

    <div id="trendingModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6 bg-black/80 opacity-0 transition-opacity duration-300">
        <div class="bg-[var(--modal-bg)] border-2 border-[var(--border-color)] rounded-[40px] max-w-xl w-full p-10 relative">
            <button onclick="closeTrending()" class="absolute top-8 right-8 text-[10px] font-black text-zinc-500 uppercase">Close [X]</button>
            <h2 class="text-2xl font-black italic uppercase mb-6 tracking-tighter">Popular Game Hubs</h2>
            <div class="trending-list">
                <div class="trending-name-btn" onclick="filterByCategory('King Legacy', null); closeTrending()">King Legacy</div>
                <div class="trending-name-btn" onclick="filterByCategory('Doors', null); closeTrending()">Doors</div>
                <div class="trending-name-btn" onclick="filterByCategory('Blade Ball', null); closeTrending()">Blade Ball</div>
                <div class="trending-name-btn" onclick="filterByCategory('Sol\'s RNG', null); closeTrending()">Sol's RNG</div>
                <div class="trending-name-btn" onclick="filterByCategory('Adopt Me', null); closeTrending()">Adopt Me</div>
                <div class="trending-name-btn" onclick="filterByCategory('BedWars', null); closeTrending()">BedWars</div>
                <div class="trending-name-btn" onclick="filterByCategory('Bee Swarm', null); closeTrending()">Bee Swarm</div>
                <div class="trending-name-btn" onclick="filterByCategory('Universal', null); closeTrending()">Universal Hub</div>
            </div>
        </div>
    </div>

    <script>
        // --- 3D ENGINE (45 Shapes) ---
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const shapes = [];

        function init3D() {
            renderer.setSize(window.innerWidth, window.innerHeight); camera.position.z = 35;
            const geoPool = [new THREE.IcosahedronGeometry(2,0), new THREE.BoxGeometry(3,3,3), new THREE.TetrahedronGeometry(2.5)];
            for(let i=0; i<45; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0x4f6b8f, wireframe: true, transparent: true, opacity: 0.15 });
                const mesh = new THREE.Mesh(geoPool[Math.floor(Math.random()*3)], mat);
                mesh.position.set((Math.random()-0.5)*100, (Math.random()-0.5)*80, (Math.random()-0.5)*50);
                mesh.userData = { speedY: 0.02 + Math.random()*0.06, rot: Math.random()*0.01 };
                scene.add(mesh); shapes.push(mesh);
            }
        }
        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(s => { s.position.y += s.userData.speedY; s.rotation.x += s.userData.rot; s.rotation.y += s.userData.rot; if(s.position.y > 40) s.position.y = -40; });
            renderer.render(scene, camera);
        }

        // --- DATA LOGIC ---
        let allScripts = []; let currentPage = 1; let currentQuery = "";
        const verStar = `<svg viewBox="0 0 24 24" class="w-full h-full" xmlns="http://www.w3.org/2000/svg"><path d="M12 1L14.39 3.46L17.77 2.82L18.89 6.04L22.14 7.02L21.31 10.33L23 13.17L20.61 15.63L21.25 19.01L18.03 20.13L17.05 23.38L13.74 22.55L10.9 24.24L8.44 21.85L5.06 22.49L3.94 19.27L0.69 18.29L1.52 14.98L-0.17 12.14L2.22 9.68L1.58 6.3L4.8 5.18L5.78 1.93L9.09 2.76L11.93 1.07Z" fill="#1D9BF0"/><path d="M9.5 15.5l-3.5-3.5 1.4-1.4 2.1 2.1 5.6-5.6 1.4 1.4-7 7z" fill="white"/></svg>`;

        function showSkeletons() {
            const grid = document.getElementById('scriptGrid');
            grid.innerHTML = Array(8).fill(0).map(() => `<div class="reth-card p-6 opacity-50"><div class="skeleton aspect-video rounded-2xl mb-5"></div><div class="skeleton h-10 w-full mb-4"></div><div class="skeleton h-4 w-2/3 mb-2"></div></div>`).join('');
        }

        async function fetchScripts(q = "", p = 1, append = false) {
            if (!append) showSkeletons();
            currentQuery = q; currentPage = p;
            const api = q ? `https://scriptblox.com/api/script/search?q=${encodeURIComponent(q)}&max=20&page=${p}` : `https://scriptblox.com/api/script/fetch?page=${p}&max=20`;
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(api)}`);
                const data = await res.json();
                const scripts = data.result.scripts || data.result.docs || [];
                allScripts = append ? [...allScripts, ...scripts] : scripts;
                document.getElementById('loadMoreArea').style.display = (currentPage < (data.result.totalPages || 1)) ? 'flex' : 'none';
                render();
            } catch (e) { console.error(e); }
        }

        function filterByCategory(cat, btn) {
            if(btn) { document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); btn.classList.add('active'); }
            document.getElementById('searchInput').value = cat; fetchScripts(cat, 1, false);
        }

        function render() {
            const grid = document.getElementById('scriptGrid');
            const fV = document.getElementById('fVer').checked, fK = document.getElementById('fKey').checked, fU = document.getElementById('fUni').checked;
            const filtered = allScripts.filter(s => {
                const matchesVer = !fV || s.verified;
                const matchesKey = !fK || s.key === false;
                const matchesUni = !fU || (s.game.name.toLowerCase().includes('universal') || s.game.name.toLowerCase().includes('all games'));
                return matchesVer && matchesKey && matchesUni;
            });
            const startIndex = (currentPage - 1) * 20;
            grid.innerHTML = filtered.map((s, i) => {
                const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "https://via.placeholder.com/400x225");
                const isNew = i >= startIndex;
                return `
                <div class="reth-card p-6 ${isNew ? 'card-pop' : ''}" onclick="openModal(${i})" style="animation-delay: ${isNew ? (i-startIndex)*0.05 : 0}s">
                    <div class="relative aspect-video rounded-2xl overflow-hidden mb-5 bg-zinc-900 border-2 border-[var(--border-color)]">
                        ${s.verified ? `<div class="ver-badge">${verStar}</div>` : ""}
                        <div class="key-badge ${s.key ? 'bg-key' : 'bg-keyless'}">${s.key ? 'Key' : 'Keyless'}</div>
                        <div class="status-badge"><span class="dot"></span> Working</div>
                        <img src="${thumb}" class="w-full h-full object-cover">
                    </div>
                    <div class="btn-copy-white" onclick="event.stopPropagation(); quickCopy(${i})">Copy Script</div>
                    <div class="stats-row"><span><i class="fa-solid fa-eye"></i> ${s.views.toLocaleString()}</span><span><i class="fa-solid fa-thumbs-up"></i> ${s.likeCount || 0}</span></div>
                    <h3 class="text-sm font-black uppercase truncate">${s.title}</h3>
                    <p class="text-[9px] text-zinc-500 font-bold uppercase truncate mt-1">${s.game.name}</p>
                </div>`;
            }).join('');
        }

        // --- UI UTILS ---
        function setTheme(m) {
            document.body.setAttribute('data-theme', m);
            document.getElementById('dBtn').classList.toggle('active', m === 'dark');
            document.getElementById('lBtn').classList.toggle('active', m === 'light');
            localStorage.setItem('reth-theme', m);
            shapes.forEach(s => s.material.color.set(m === 'light' ? 0x000000 : 0x4f6b8f));
        }

        function openModal(i) {
            const s = allScripts[i];
            const thumb = s.image && !s.image.includes('http') ? `https://scriptblox.com${s.image}` : (s.game.imageUrl || "");
            document.getElementById('mTitle').innerText = s.title; document.getElementById('mImg').src = thumb;
            document.getElementById('mStatsRow').innerHTML = `<span>Views: ${s.views.toLocaleString()}</span><span>Likes: ${s.likeCount || 0}</span><span>Game: ${s.game.name}</span>`;
            document.getElementById('mCode').innerText = s.script || "-- No Code --";
            document.getElementById('mLink').href = "https://scriptblox.com/script/" + s.slug;
            const m = document.getElementById('modal'); m.classList.replace('hidden', 'flex'); setTimeout(() => m.classList.add('opacity-100'), 10);
        }
        function closeModal() { const m = document.getElementById('modal'); m.classList.remove('opacity-100'); setTimeout(() => m.classList.replace('flex', 'hidden'), 300); }

        function openTrending() { const m = document.getElementById('trendingModal'); m.classList.replace('hidden', 'flex'); setTimeout(() => m.classList.add('opacity-100'), 10); }
        function closeTrending() { const m = document.getElementById('trendingModal'); m.classList.remove('opacity-100'); setTimeout(() => m.classList.replace('flex', 'hidden'), 300); }

        function showToast() { const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
        function copyFromModal() { navigator.clipboard.writeText(document.getElementById('mCode').innerText); showToast(); }
        function quickCopy(i) { navigator.clipboard.writeText(allScripts[i].script); showToast(); }
        function loadMore() { fetchScripts(currentQuery, currentPage + 1, true); }
        function toggleFilter() { document.getElementById('filterMenu').classList.toggle('hidden'); }

        window.onload = () => { init3D(); animate3D(); setTheme(localStorage.getItem('reth-theme') || 'dark'); fetchScripts(); };
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        let db; document.getElementById('searchInput').addEventListener('input', (e) => { clearTimeout(db); db = setTimeout(() => fetchScripts(e.target.value, 1, false), 500); });
    </script>
</body>
</html>
